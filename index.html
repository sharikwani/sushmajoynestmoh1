function PaymentHistory({ payments, flats, deletePayment, toast }) {
  const [filter, setFilter] = useState({ period: 'all', tower: 'all', mode: 'all', q: '' });
  const [page, setPage] = useState(0);
  const PAGE = 50;

  const allPeriods = useMemo(() => {
    const set = new Set();
    payments.forEach(p => migratePayment(p).periods.forEach(x => set.add(x)));
    return Array.from(set).sort().reverse();
  }, [payments]);

  const filtered = useMemo(() => {
    const q = filter.q.toLowerCase().trim();
    return [...payments]
      .filter(p => {
        if (filter.period !== 'all' && !paymentCovers(p, filter.period)) return false;
        if (filter.mode !== 'all' && p.mode !== filter.mode) return false;
        if (filter.tower !== 'all') {
          const tower = (flats.find(f => f.flat_no === p.flat_no) || {}).tower;
          if (tower !== filter.tower) return false;
        }
        if (q) {
          const flat = flats.find(f => f.flat_no === p.flat_no);
          const hay = `${p.flat_no} ${p.receipt_no} ${p.notes} ${(flat||{}).owner_name||''}`.toLowerCase();
          if (!hay.includes(q)) return false;
        }
        return true;
      })
      .sort((a,b) => (b.recorded_at||'').localeCompare(a.recorded_at||''));
  }, [payments, flats, filter]);

  const total = filtered.reduce((s,p) => s + p.amount, 0);
  useEffect(() => { setPage(0); }, [filter]);
  const slice = filtered.slice(page*PAGE, page*PAGE + PAGE);

  const exportCSV = () => {
    const rows = filtered.map(p => {
      const f = flats.find(x => x.flat_no === p.flat_no) || {};
      const m = migratePayment(p);
      return {
        periods: m.periods.join(' | '),
        months_count: m.periods.length,
        flat_no: p.flat_no, owner: f.owner_name || '',
        amount: p.amount,
        per_month: Math.round(m.per_period_amount || p.amount),
        mode: p.mode, paid_on: p.paid_on,
        receipt_no: p.receipt_no, notes: p.notes, recorded_at: p.recorded_at,
      };
    });
    download(`payments-${todayISO()}.csv`, toCSV(rows), 'text/csv');
    toast(`Exported ${rows.length} payments`, 'success');
  };

  return (
    <div className="space-y-5">
      <div className="flex flex-wrap items-end justify-between gap-4">
        <div>
          <div className="text-[11px] uppercase tracking-[0.2em] text-clay-500 mb-1">Ledger</div>
          <h1 className="font-display text-4xl text-ink leading-none">Payment History</h1>
          <p className="text-sm text-ink-muted mt-1.5">{filtered.length} entries · <span className="font-medium text-ink">{inr(total)}</span> matching filter</p>
        </div>
        <Button variant="outline" onClick={exportCSV}><Icon name="download" /> Export CSV</Button>
      </div>

      <div className="bg-ivory-warm rounded-xl ring-soft p-4 grid grid-cols-2 md:grid-cols-4 gap-3">
        <div className="relative">
          <Icon name="search" className="absolute left-3 top-1/2 -translate-y-1/2 text-ink-muted w-4 h-4" />
          <input value={filter.q} onChange={e => setFilter({...filter, q: e.target.value})} placeholder="Flat, receipt, note…" className="w-full pl-9 pr-3 py-2 bg-ivory-deep/40 ring-soft rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-teal-500/50" />
        </div>
        <Select value={filter.period} onChange={e => setFilter({...filter, period: e.target.value})}>
          <option value="all">All periods</option>
          {allPeriods.map(p => <option key={p} value={p}>{periodLabel(p)}</option>)}
        </Select>
        <Select value={filter.tower} onChange={e => setFilter({...filter, tower: e.target.value})}>
          <option value="all">All towers</option>
          {['A','B','C','D','J','K','L','M','Shops'].map(t => <option key={t}>{t}</option>)}
        </Select>
        <Select value={filter.mode} onChange={e => setFilter({...filter, mode: e.target.value})}>
          <option value="all">All modes</option>
          {PAYMENT_MODES.map(m => <option key={m}>{m}</option>)}
        </Select>
      </div>

      <div className="bg-ivory-warm rounded-xl ring-soft overflow-hidden">
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead className="bg-ivory-deep/60 text-[11px] uppercase tracking-wider text-ink-muted">
              <tr>
                <th className="text-left px-5 py-2.5">Date</th>
                <th className="text-left">Flat</th>
                <th className="text-left">Owner</th>
                <th className="text-left">Period</th>
                <th className="text-right">Amount</th>
                <th className="text-left">Mode</th>
                <th className="text-left">Receipt</th>
                <th className="text-left">Notes</th>
                <th className="text-right pr-5"></th>
              </tr>
            </thead>
            <tbody className="divide-soft">
              {slice.length === 0 && <tr><td colSpan="9" className="text-center py-10 text-ink-muted">No payments match.</td></tr>}
              {slice.map(p => {
                const f = flats.find(x => x.flat_no === p.flat_no) || {};
                const m = migratePayment(p);
                return (
                  <tr key={p.id} className="hover:bg-ivory-deep/40">
                    <td className="px-5 py-2.5 tabular text-ink-soft">{p.paid_on}</td>
                    <td className="font-mono text-teal-500 font-medium">{p.flat_no}</td>
                    <td>{f.owner_name || '—'}</td>
                    <td className="text-ink-soft">
                      {periodsLabel(m.periods)}
                      {m.periods.length > 1 && <span className="ml-1.5 inline-flex items-center px-1.5 py-0.5 rounded text-[10px] bg-teal-500/10 text-teal-500 font-medium">{m.periods.length} mo</span>}
                    </td>
                    <td className="text-right tabular font-medium text-moss-500">{inr(p.amount)}</td>
                    <td className="text-ink-soft">{p.mode}</td>
                    <td className="font-mono text-xs text-ink-soft">{p.receipt_no}</td>
                    <td className="text-xs text-ink-muted max-w-[180px] truncate" title={p.notes}>{p.notes}</td>
                    <td className="text-right pr-5"><button onClick={() => { if (confirm('Delete this payment entry?')) { deletePayment(p.id); toast('Payment deleted', 'success'); } }} className="text-crimson-500 hover:text-crimson-600"><Icon name="trash" /></button></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
        {filtered.length > PAGE && (
          <div className="px-5 py-3 flex items-center justify-between text-xs bg-ivory-deep/40 border-t border-teal-500/10">
            <div className="text-ink-muted">Page {page+1} of {Math.ceil(filtered.length/PAGE)}</div>
            <div className="flex gap-2">
              <Button size="sm" variant="ghost" disabled={page===0} onClick={() => setPage(p => p-1)}>Prev</Button>
              <Button size="sm" variant="ghost" disabled={(page+1)*PAGE >= filtered.length} onClick={() => setPage(p => p+1)}>Next</Button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function Defaulters({ flats, payments, currentPeriod, config, toast }) {
  const [periodFrom, setPeriodFrom] = useState(periodMinus(currentPeriod, 5));
  const [periodTo, setPeriodTo] = useState(currentPeriod);
  const [scope, setScope] = useState('current');   // current | range | chronic
  const [groupBy, setGroupBy] = useState('tower'); // tower | severity | none
  const [towerFilter, setTowerFilter] = useState('all');

  // For chronic mode, look back 12 months
  const periods = useMemo(() => {
    if (scope === 'current') return [currentPeriod];
    if (scope === 'chronic') return periodsBetween(periodMinus(currentPeriod, 11), currentPeriod);
    return periodsBetween(periodFrom, periodTo);
  }, [scope, currentPeriod, periodFrom, periodTo]);

  const defaulters = useMemo(() => {
    const out = [];
    const occupied = flats.filter(f => f.occupancy !== 'Vacant');
    occupied.forEach(f => {
      if (towerFilter !== 'all' && f.tower !== towerFilter) return;
      const unpaidPeriods = [];
      let totalDue = 0;
      periods.forEach(p => {
        const paid = paidByFlatInPeriod(payments, f.flat_no, p);
        if (paid < f.monthly_amount) {
          unpaidPeriods.push(p);
          totalDue += (f.monthly_amount - paid);
        }
      });
      if (unpaidPeriods.length) {
        const allFlatPays = payments.filter(pay => pay.flat_no === f.flat_no);
        const lastPaid = allFlatPays.sort((a,b) => (b.paid_on||'').localeCompare(a.paid_on||''))[0];
        // severity
        const n = unpaidPeriods.length;
        const severity = n >= 6 ? 4 : n >= 3 ? 3 : n >= 2 ? 2 : 1;
        out.push({ ...f, unpaidPeriods, totalDue, lastPaid, severity });
      }
    });
    // chronic mode: only show 3+ months
    const filtered = scope === 'chronic' ? out.filter(d => d.unpaidPeriods.length >= 3) : out;
    return filtered.sort((a,b) => b.totalDue - a.totalDue);
  }, [flats, payments, periods, scope, towerFilter]);

  const totalOutstanding = defaulters.reduce((s,d) => s + d.totalDue, 0);

  // Tower-wise summary
  const towerSummary = useMemo(() => {
    const map = {};
    ['A','B','C','D','J','K','L','M','Shops'].forEach(t => {
      map[t] = { count: 0, amount: 0, chronic: 0 };
    });
    defaulters.forEach(d => {
      if (!map[d.tower]) map[d.tower] = { count: 0, amount: 0, chronic: 0 };
      map[d.tower].count++;
      map[d.tower].amount += d.totalDue;
      if (d.unpaidPeriods.length >= 3) map[d.tower].chronic++;
    });
    return map;
  }, [defaulters]);

  // Group defaulters
  const grouped = useMemo(() => {
    if (groupBy === 'none') return [{ key: 'All', items: defaulters }];
    if (groupBy === 'severity') {
      const sevMap = { 4: 'Chronic (6+ months)', 3: 'High (3-5 months)', 2: '2 months', 1: '1 month' };
      const groups = {};
      [4,3,2,1].forEach(s => { groups[s] = { key: sevMap[s], severity: s, items: [] }; });
      defaulters.forEach(d => groups[d.severity].items.push(d));
      return Object.values(groups).filter(g => g.items.length);
    }
    // tower
    const groups = {};
    ['A','B','C','D','J','K','L','M','Shops'].forEach(t => { groups[t] = { key: `Tower ${t}`, items: [] }; });
    defaulters.forEach(d => {
      if (!groups[d.tower]) groups[d.tower] = { key: `Tower ${d.tower}`, items: [] };
      groups[d.tower].items.push(d);
    });
    return Object.values(groups).filter(g => g.items.length);
  }, [defaulters, groupBy]);

  const reminderMessage = (d) => {
    const periodStr = d.unpaidPeriods.length === 1
      ? periodLabel(d.unpaidPeriods[0])
      : `${d.unpaidPeriods.length} months (${periodLabel(d.unpaidPeriods[0])}–${periodLabel(d.unpaidPeriods[d.unpaidPeriods.length-1])})`;
    return `Dear ${d.owner_name || 'Resident'},\n\nThis is a gentle reminder that the maintenance for flat ${d.flat_no} (${config.society_name}) is pending for ${periodStr}. Total amount due: ${inr(d.totalDue)}.\n\nKindly clear the dues at your earliest convenience.\n\nThank you,\n${config.treasurer_name || 'Treasurer'}\nA/RWA`;
  };

  const exportCSV = () => {
    const rows = defaulters.map(d => ({
      flat_no: d.flat_no, tower: d.tower, type: d.type,
      owner_name: d.owner_name, phone: d.owner_phone, email: d.owner_email,
      months_due: d.unpaidPeriods.length, total_due: d.totalDue,
      periods_unpaid: d.unpaidPeriods.map(periodLabel).join(' | '),
      last_paid_on: d.lastPaid?.paid_on || 'never',
      severity: d.severity,
    }));
    download(`defaulters-${todayISO()}.csv`, toCSV(rows), 'text/csv');
    toast(`Exported ${rows.length} defaulters`, 'success');
  };

  const [showMsg, setShowMsg] = useState(null);

  const sevClass = (s) => `sev-${s}`;
  const sevLabel = (s) => ({ 4: 'CHRONIC', 3: 'HIGH', 2: 'MED', 1: 'LOW' })[s];

  return (
    <div className="space-y-5">
      <div className="flex flex-wrap items-end justify-between gap-4">
        <div>
          <div className="text-[11px] uppercase tracking-[0.2em] text-clay-500 mb-1 font-semibold">Outstanding</div>
          <h1 className="font-display text-4xl text-ink leading-none">Defaulters</h1>
          <p className="text-sm text-ink-soft mt-1.5"><span className="font-semibold text-ink">{defaulters.length}</span> flats with dues · <span className="font-bold text-crimson-500 tabular text-base">{inr(totalOutstanding)}</span> outstanding</p>
        </div>
        <Button variant="outline" onClick={exportCSV}><Icon name="download" /> Export list</Button>
      </div>

      {/* Tower summary cards */}
      <div className="grid grid-cols-3 sm:grid-cols-5 lg:grid-cols-9 gap-2">
        {['A','B','C','D','J','K','L','M','Shops'].map(t => {
          const s = towerSummary[t] || { count: 0, amount: 0, chronic: 0 };
          const active = towerFilter === t;
          const allActive = towerFilter === 'all';
          return (
            <button
              key={t}
              onClick={() => setTowerFilter(active ? 'all' : t)}
              className={`p-3 rounded-lg text-left transition ${
                active ? 'bg-teal-500 text-ivory-warm shadow' :
                s.count === 0 ? 'bg-moss-500/10 text-moss-600 ring-1 ring-moss-500/20' :
                s.chronic > 0 ? 'bg-crimson-500/10 text-crimson-600 ring-1 ring-crimson-500/30' :
                'bg-clay-500/10 text-clay-600 ring-1 ring-clay-500/20'
              } ${!allActive && !active ? 'opacity-50' : ''}`}
            >
              <div className="font-display text-lg leading-none">{t}</div>
              <div className="text-[11px] mt-1 font-semibold">{s.count} unpaid</div>
              <div className="text-[10px] tabular mt-0.5">{inrShort(s.amount)}</div>
              {s.chronic > 0 && <div className="text-[10px] font-bold mt-0.5">{s.chronic} chronic</div>}
            </button>
          );
        })}
      </div>

      <div className="bg-ivory-warm rounded-xl ring-soft p-4 flex flex-wrap items-center gap-3">
        <div className="bg-ivory-deep/50 rounded-lg p-1 flex text-sm">
          <button onClick={() => setScope('current')} className={`px-3 py-1.5 rounded font-semibold ${scope==='current' ? 'bg-teal-500 text-ivory-warm' : 'text-ink-soft'}`}>This month</button>
          <button onClick={() => setScope('range')} className={`px-3 py-1.5 rounded font-semibold ${scope==='range' ? 'bg-teal-500 text-ivory-warm' : 'text-ink-soft'}`}>Range</button>
          <button onClick={() => setScope('chronic')} className={`px-3 py-1.5 rounded font-semibold ${scope==='chronic' ? 'bg-crimson-500 text-white' : 'text-ink-soft'}`}>Chronic (3+ mo)</button>
        </div>
        {scope === 'range' && (
          <div className="flex items-center gap-2 text-sm">
            <span className="text-ink-soft font-medium">From</span>
            <Input type="month" value={periodFrom} onChange={e => setPeriodFrom(e.target.value)} className="w-auto" />
            <span className="text-ink-soft font-medium">to</span>
            <Input type="month" value={periodTo} onChange={e => setPeriodTo(e.target.value)} className="w-auto" />
            <span className="text-xs text-ink-muted">{periods.length} months</span>
          </div>
        )}
        <div className="ml-auto bg-ivory-deep/50 rounded-lg p-1 flex text-sm">
          <span className="px-2 py-1 text-[11px] uppercase tracking-wider text-ink-muted font-semibold self-center">Group by</span>
          <button onClick={() => setGroupBy('tower')} className={`px-3 py-1.5 rounded font-semibold ${groupBy==='tower' ? 'bg-teal-500 text-ivory-warm' : 'text-ink-soft'}`}>Tower</button>
          <button onClick={() => setGroupBy('severity')} className={`px-3 py-1.5 rounded font-semibold ${groupBy==='severity' ? 'bg-teal-500 text-ivory-warm' : 'text-ink-soft'}`}>Severity</button>
          <button onClick={() => setGroupBy('none')} className={`px-3 py-1.5 rounded font-semibold ${groupBy==='none' ? 'bg-teal-500 text-ivory-warm' : 'text-ink-soft'}`}>None</button>
        </div>
      </div>

      {defaulters.length === 0 && (
        <div className="bg-moss-500/10 ring-1 ring-moss-500/30 rounded-xl p-10 text-center">
          <Icon name="check" className="w-10 h-10 mx-auto text-moss-500 mb-2" />
          <div className="font-display text-2xl text-moss-600">All clear!</div>
          <div className="text-sm text-ink-soft mt-1">No defaulters for {scope === 'current' ? periodLabel(currentPeriod) : 'this period'}.</div>
        </div>
      )}

      {grouped.map(group => (
        <div key={group.key} className="bg-ivory-warm rounded-xl ring-soft overflow-hidden">
          <div className="px-5 py-3 bg-ivory-deep/50 border-b border-teal-500/10 flex items-center justify-between">
            <div className="font-display text-lg text-teal-500">{group.key}</div>
            <div className="text-sm text-ink-soft font-medium">
              {group.items.length} flat{group.items.length !== 1 ? 's' : ''} ·
              <span className="font-bold text-crimson-500 tabular ml-1">{inr(group.items.reduce((s,d) => s + d.totalDue, 0))}</span>
            </div>
          </div>
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead className="bg-ivory-deep/30 text-[12px] uppercase tracking-wider text-ink-soft font-semibold">
                <tr>
                  <th className="text-left px-5 py-2.5">Flat</th>
                  <th className="text-left">Owner</th>
                  <th className="text-left">Severity</th>
                  <th className="text-right">Months</th>
                  <th className="text-right">Amount Due</th>
                  <th className="text-left">Last Paid</th>
                  <th className="text-left">Contact</th>
                  <th className="text-right pr-5">Notify</th>
                </tr>
              </thead>
              <tbody className="divide-soft">
                {group.items.map(d => (
                  <tr key={d.id} className={`hover:bg-ivory-deep/40 ${d.severity >= 3 ? 'bg-crimson-500/5' : ''}`}>
                    <td className="px-5 py-3 font-mono font-bold text-teal-500 text-base">{d.flat_no}</td>
                    <td>
                      <div className="font-semibold text-ink">{d.owner_name || <span className="text-ink-muted italic font-normal">— unassigned —</span>}</div>
                      <div className="text-[12px] text-ink-soft">{d.tower} · {d.type} · {d.occupancy}</div>
                    </td>
                    <td>
                      <span className={`inline-flex items-center px-2 py-1 rounded text-[11px] font-bold tracking-wider ${sevClass(d.severity)}`}>
                        {sevLabel(d.severity)}
                      </span>
                    </td>
                    <td className="text-right tabular font-bold text-ink">{d.unpaidPeriods.length}</td>
                    <td className="text-right tabular font-bold text-crimson-500 text-base">{inr(d.totalDue)}</td>
                    <td className="text-xs text-ink-soft">{d.lastPaid ? d.lastPaid.paid_on : <span className="italic text-crimson-500 font-medium">never</span>}</td>
                    <td>
                      <div className="flex gap-1.5">
                        {d.owner_phone && <a href={`${waLink(d.owner_phone)}?text=${encodeURIComponent(reminderMessage(d))}`} target="_blank" rel="noopener" title="WhatsApp" className="p-1.5 rounded bg-[#25D366] text-white hover:opacity-90"><Icon name="whatsapp" className="w-3.5 h-3.5" /></a>}
                        {d.owner_phone && <a href={`tel:${cleanPhone(d.owner_phone)}`} title="Call" className="p-1.5 rounded bg-teal-500 text-ivory-warm hover:bg-teal-600"><Icon name="phone" className="w-3.5 h-3.5" /></a>}
                        {d.owner_phone && <a href={`sms:${cleanPhone(d.owner_phone)}?body=${encodeURIComponent(reminderMessage(d))}`} title="SMS" className="p-1.5 rounded bg-clay-500 text-white hover:bg-clay-600"><Icon name="msg" className="w-3.5 h-3.5" /></a>}
                        {d.owner_email && <a href={`mailto:${d.owner_email}?subject=${encodeURIComponent('Maintenance dues — ' + d.flat_no)}&body=${encodeURIComponent(reminderMessage(d))}`} title="Email" className="p-1.5 rounded bg-ink text-ivory-warm hover:opacity-90"><Icon name="mail" className="w-3.5 h-3.5" /></a>}
                      </div>
                    </td>
                    <td className="text-right pr-5">
                      <button onClick={() => setShowMsg({ d, text: reminderMessage(d) })} className="text-xs text-teal-500 hover:underline font-semibold">View message</button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      ))}

      <Modal open={!!showMsg} onClose={() => setShowMsg(null)} title={showMsg ? `Reminder for ${showMsg.d.flat_no}` : ''} maxWidth="max-w-xl"
        footer={<>
          <Button variant="ghost" onClick={() => setShowMsg(null)}>Close</Button>
          <Button variant="soft" onClick={() => { navigator.clipboard.writeText(showMsg.text); toast('Message copied to clipboard', 'success'); }}><Icon name="list" /> Copy</Button>
        </>}>
        {showMsg && <>
          <div className="mb-2 text-[12px] text-ink-soft">
            {showMsg.d.owner_name && <span><strong>To:</strong> {showMsg.d.owner_name}</span>}
            {showMsg.d.owner_phone && <span className="ml-3"><Icon name="phone" className="w-3 h-3 inline mr-0.5" /> {showMsg.d.owner_phone}</span>}
            {showMsg.d.owner_email && <span className="ml-3"><Icon name="mail" className="w-3 h-3 inline mr-0.5" /> {showMsg.d.owner_email}</span>}
            {!showMsg.d.owner_phone && !showMsg.d.owner_email && (
              <span className="text-clay-500">⚠ No phone/email saved for this flat — buttons below will open the app with no recipient pre-filled. Add contact in Flats &amp; Owners for one-tap sending.</span>
            )}
          </div>
          <Textarea value={showMsg.text} onChange={e => setShowMsg({...showMsg, text: e.target.value})} rows={9} />
          <div className="mt-3">
            <div className="text-[11px] uppercase tracking-wider text-ink-soft font-semibold mb-2">Send reminder via</div>
            <div className="grid grid-cols-2 sm:grid-cols-4 gap-2">
              <a
                href={showMsg.d.owner_phone
                  ? `${waLink(showMsg.d.owner_phone)}?text=${encodeURIComponent(showMsg.text)}`
                  : `https://wa.me/?text=${encodeURIComponent(showMsg.text)}`}
                target="_blank" rel="noopener"
                className="px-3 py-2 bg-[#25D366] text-white rounded-md inline-flex items-center justify-center gap-1.5 font-semibold text-xs hover:opacity-90"
              >
                <Icon name="whatsapp" className="w-3.5 h-3.5" /> WhatsApp
              </a>
              <a
                href={`mailto:${showMsg.d.owner_email || ''}?subject=${encodeURIComponent('Maintenance dues — ' + showMsg.d.flat_no + ' · ' + config.society_name)}&body=${encodeURIComponent(showMsg.text)}`}
                className="px-3 py-2 bg-ink text-ivory-warm rounded-md inline-flex items-center justify-center gap-1.5 font-semibold text-xs hover:opacity-90"
              >
                <Icon name="mail" className="w-3.5 h-3.5" /> Email
              </a>
              <a
                href={showMsg.d.owner_phone
                  ? `sms:${cleanPhone(showMsg.d.owner_phone)}?body=${encodeURIComponent(showMsg.text)}`
                  : `sms:?body=${encodeURIComponent(showMsg.text)}`}
                className="px-3 py-2 bg-clay-500 text-white rounded-md inline-flex items-center justify-center gap-1.5 font-semibold text-xs hover:bg-clay-600"
              >
                <Icon name="msg" className="w-3.5 h-3.5" /> SMS
              </a>
              <button
                onClick={async () => {
                  if (navigator.share) {
                    try { await navigator.share({ title: 'Maintenance Reminder — ' + showMsg.d.flat_no, text: showMsg.text }); }
                    catch (e) { /* user cancelled */ }
                  } else {
                    navigator.clipboard.writeText(showMsg.text);
                    toast('Share not supported — text copied instead', 'info');
                  }
                }}
                className="px-3 py-2 bg-teal-500 text-white rounded-md inline-flex items-center justify-center gap-1.5 font-semibold text-xs hover:bg-teal-600"
              >
                <Icon name="share" className="w-3.5 h-3.5" /> Share…
              </button>
            </div>
          </div>
        </>}
      </Modal>
    </div>
  );
}

function Reports({ flats, payments, currentPeriod, config }) {
  const [period, setPeriod] = useState(currentPeriod);
  const [year, setYear] = useState(parsePeriod(currentPeriod).y);

  const monthlySummary = useMemo(() => {
    const occupied = flats.filter(f => f.occupancy !== 'Vacant');
    const expected = occupied.reduce((s,f) => s + f.monthly_amount, 0);
    // Allocate per-period amounts to this period across all payments
    let collected = 0;
    const byMode = {};
    const paidByFlat = {};
    payments.forEach(p => {
      const amt = paymentAmountForPeriod(p, period);
      if (amt <= 0) return;
      collected += amt;
      byMode[p.mode] = (byMode[p.mode] || 0) + amt;
      paidByFlat[p.flat_no] = (paidByFlat[p.flat_no] || 0) + amt;
    });
    const byTower = {};
    ['A','B','C','D','J','K','L','M','Shops'].forEach(t => {
      const fs = occupied.filter(f => f.tower === t);
      const exp = fs.reduce((s,f) => s + f.monthly_amount, 0);
      const col = fs.reduce((s,f) => s + (paidByFlat[f.flat_no] || 0), 0);
      const defaulters = fs.filter(f => !paidByFlat[f.flat_no]).length;
      byTower[t] = { expected: exp, collected: col, defaulters, units: fs.length };
    });
    return { expected, collected, pending: expected - collected, byMode, byTower };
  }, [flats, payments, period]);

  const yearData = useMemo(() => {
    const months = [];
    for (let m = 1; m <= 12; m++) {
      const p = `${year}-${String(m).padStart(2,'0')}`;
      const c = collectedForPeriod(payments, p);
      months.push({ month: monthNames[m-1], period: p, collected: c });
    }
    const total = months.reduce((s,m) => s + m.collected, 0);
    const max = Math.max(1, ...months.map(m => m.collected));
    return { months, total, max };
  }, [payments, year]);

  return (
    <div className="space-y-6">
      <div className="flex flex-wrap items-end justify-between gap-4 no-print">
        <div>
          <div className="text-[11px] uppercase tracking-[0.2em] text-clay-500 mb-1">Reports</div>
          <h1 className="font-display text-4xl text-ink leading-none">Treasury Reports</h1>
          <p className="text-sm text-ink-muted mt-1.5">Monthly snapshots, yearly trends and printable summaries.</p>
        </div>
        <Button variant="outline" onClick={() => window.print()}><Icon name="print" /> Print page</Button>
      </div>

      <div className="bg-ivory-warm rounded-xl ring-soft p-5">
        <div className="flex flex-wrap items-end justify-between gap-3 mb-4">
          <div>
            <div className="text-[11px] uppercase tracking-wider text-ink-muted">Monthly Summary</div>
            <div className="font-display text-2xl text-ink">{periodLabelFull(period)}</div>
          </div>
          <Field label="Period"><Input type="month" value={period} onChange={e => setPeriod(e.target.value)} /></Field>
        </div>
        <div className="grid grid-cols-3 gap-3 mb-5">
          <div className="bg-teal-50/60 rounded-lg p-4">
            <div className="text-[10px] uppercase text-ink-muted">Expected</div>
            <div className="font-display text-2xl text-teal-500 tabular">{inr(monthlySummary.expected)}</div>
          </div>
          <div className="bg-moss-500/10 rounded-lg p-4">
            <div className="text-[10px] uppercase text-ink-muted">Collected</div>
            <div className="font-display text-2xl text-moss-500 tabular">{inr(monthlySummary.collected)}</div>
          </div>
          <div className="bg-crimson-500/10 rounded-lg p-4">
            <div className="text-[10px] uppercase text-ink-muted">Pending</div>
            <div className="font-display text-2xl text-crimson-500 tabular">{inr(monthlySummary.pending)}</div>
          </div>
        </div>

        <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
          <div>
            <div className="text-[11px] uppercase tracking-wider text-ink-muted mb-2">By Tower</div>
            <table className="w-full text-sm">
              <thead className="text-[10px] uppercase text-ink-muted border-b border-teal-500/15">
                <tr>
                  <th className="text-left py-1.5">Tower</th>
                  <th className="text-right">Expected</th>
                  <th className="text-right">Collected</th>
                  <th className="text-right">Defaulters</th>
                </tr>
              </thead>
              <tbody className="divide-soft">
                {Object.entries(monthlySummary.byTower).map(([t, v]) => (
                  <tr key={t}>
                    <td className="py-1.5 font-display text-teal-500">{t}</td>
                    <td className="text-right tabular">{inr(v.expected)}</td>
                    <td className="text-right tabular text-moss-500">{inr(v.collected)}</td>
                    <td className="text-right tabular">{v.defaulters}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div>
            <div className="text-[11px] uppercase tracking-wider text-ink-muted mb-2">By Mode of Payment</div>
            {Object.keys(monthlySummary.byMode).length === 0 ? (
              <div className="text-sm text-ink-muted py-6 text-center">No payments yet for this period.</div>
            ) : (
              <table className="w-full text-sm">
                <thead className="text-[10px] uppercase text-ink-muted border-b border-teal-500/15">
                  <tr><th className="text-left py-1.5">Mode</th><th className="text-right">Amount</th><th className="text-right">Share</th></tr>
                </thead>
                <tbody className="divide-soft">
                  {Object.entries(monthlySummary.byMode).sort((a,b)=>b[1]-a[1]).map(([m,v]) => (
                    <tr key={m}>
                      <td className="py-1.5">{m}</td>
                      <td className="text-right tabular">{inr(v)}</td>
                      <td className="text-right tabular text-ink-muted">{((v/monthlySummary.collected)*100).toFixed(1)}%</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            )}
          </div>
        </div>
      </div>

      <div className="bg-ivory-warm rounded-xl ring-soft p-5">
        <div className="flex flex-wrap items-end justify-between gap-3 mb-4">
          <div>
            <div className="text-[11px] uppercase tracking-wider text-ink-muted">Yearly Collection</div>
            <div className="font-display text-2xl text-ink">{year} · Total {inr(yearData.total)}</div>
          </div>
          <Field label="Year">
            <Select value={year} onChange={e => setYear(Number(e.target.value))}>
              {[year-2,year-1,year,year+1].map(y => <option key={y} value={y}>{y}</option>)}
            </Select>
          </Field>
        </div>
        <div className="flex items-end gap-2 h-40 px-2">
          {yearData.months.map(m => (
            <div key={m.month} className="flex-1 flex flex-col items-center justify-end gap-1.5 group">
              <div className="text-[10px] tabular text-ink-muted opacity-0 group-hover:opacity-100 transition">{inrShort(m.collected)}</div>
              <div className="w-full rounded-t bg-teal-500" style={{ height: `${(m.collected/yearData.max) * 100}%`, minHeight: '2px' }}></div>
              <div className="text-[10px] text-ink-muted">{m.month}</div>
            </div>
          ))}
        </div>
      </div>

      <div className="print-only">
        <div className="font-display text-2xl text-center mt-4 mb-2">{config.society_name} — Treasury Report</div>
        <div className="text-center text-sm text-ink-muted">Generated on {todayISO()} · Treasurer: {config.treasurer_name || '—'}</div>
      </div>
    </div>
  );
}

function Settings({ config, setConfig, flats, setFlats, payments, setPayments, expenses, setExpenses, staff, setStaff, toast,
                    syncStatus, lastSync, onChangePassphrase, onChangeToken, onForceSync }) {
  const [draft, setDraft] = useState(config);
  useEffect(() => setDraft(config), [config]);
  const fileRef = useRef();

  const save = () => { setConfig(draft); toast('Settings saved', 'success'); };

  const updateRate = (tower, type, val) => {
    setDraft({ ...draft, rates: { ...draft.rates, [tower]: { ...draft.rates[tower], [type]: Number(val) || 0 } } });
  };

  const applyRatesToFlats = () => {
    if (!confirm('Apply current rates to every flat (overwriting per-flat overrides)?')) return;
    const next = flats.map(f => {
      const newRate = (draft.rates[f.tower] && draft.rates[f.tower][f.type]) || f.monthly_amount;
      return { ...f, monthly_amount: newRate, updated_at: nowISO() };
    });
    setFlats(next);
    toast('Rates applied to all flats', 'success');
  };

  const exportAll = () => {
    const backup = { exported_at: nowISO(), config, flats, payments };
    download(`sjm1-backup-${todayISO()}.json`, JSON.stringify(backup, null, 2), 'application/json');
    toast('Backup downloaded', 'success');
  };

  const importAll = (file) => {
    if (!confirm('This will replace all existing data with the contents of the backup file. Continue?')) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        if (!data.flats || !data.payments) throw new Error('Backup format unrecognised');
        setFlats(data.flats);
        setPayments(data.payments);
        if (data.config) setConfig(data.config);
        toast('Backup restored', 'success');
      } catch (e) {
        toast('Restore failed: ' + e.message, 'error');
      }
    };
    reader.readAsText(file);
  };

  const resetAll = async () => {
    if (!confirm('Reset everything? This will erase all flats, payments, expenses and staff on GitHub.\n\nThe data file will be wiped and you will need to re-initialise the society.')) return;
    if (!confirm('Are you absolutely sure? This cannot be undone. Type-confirm by pressing OK.')) return;
    try {
      // Save empty state to GitHub
      const empty = { config: DEFAULT_CONFIG, flats: [], payments: [], expenses: [], staff: [] };
      await vault.save(empty, 'Reset all data');
      // Clear local cache
      ['sjm1:flats:v1','sjm1:payments:v1','sjm1:config:v1','sjm1:expenses:v1','sjm1:staff:v1','sjm1:auth:session','sjm1:vault:repo'].forEach(k => localStorage.removeItem(k));
      location.reload();
    } catch (e) {
      alert('Reset failed: ' + e.message);
    }
  };

  const syncTimeAgo = (() => {
    if (!lastSync) return '—';
    const s = Math.floor((Date.now() - lastSync) / 1000);
    if (s < 60) return 'just now';
    if (s < 3600) return `${Math.floor(s/60)} min ago`;
    if (s < 86400) return `${Math.floor(s/3600)} hrs ago`;
    return new Date(lastSync).toLocaleString();
  })();

  return (
    <div className="space-y-5">
      <div>
        <div className="text-[11px] uppercase tracking-[0.2em] text-clay-500 font-semibold mb-1">Configuration</div>
        <h1 className="font-display text-4xl text-ink leading-none">Settings</h1>
        <p className="text-sm text-ink-soft mt-1.5">Society identity, maintenance rates, GitHub sync, access password and backups.</p>
      </div>

      <div className="bg-ivory-warm rounded-xl ring-soft p-5">
        <div className="font-display text-lg text-teal-500 mb-3">Society &amp; Treasurer</div>
        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
          <Field label="Society name"><Input value={draft.society_name} onChange={e => setDraft({...draft, society_name: e.target.value})} /></Field>
          <Field label="Due day of month" hint="Reminders flag flats unpaid after this day"><Input type="number" min="1" max="28" value={draft.due_day} onChange={e => setDraft({...draft, due_day: Number(e.target.value)||10})} /></Field>
          <Field label="Treasurer name"><Input value={draft.treasurer_name} onChange={e => setDraft({...draft, treasurer_name: e.target.value})} /></Field>
          <Field label="Treasurer phone"><Input value={draft.treasurer_phone} onChange={e => setDraft({...draft, treasurer_phone: e.target.value})} /></Field>
          <Field label="Treasurer email" className="md:col-span-2"><Input value={draft.treasurer_email} onChange={e => setDraft({...draft, treasurer_email: e.target.value})} /></Field>
        </div>
        <div className="mt-4 flex justify-end"><Button onClick={save}>Save</Button></div>
      </div>

      {/* Encrypted Vault */}
      <div className="bg-ivory-warm rounded-xl ring-soft p-5">
        <div className="flex items-center justify-between mb-3">
          <div className="font-display text-lg text-teal-500 flex items-center gap-2"><Icon name="lock" /> Encrypted Vault</div>
          <SyncStatusBadge status={syncStatus} lastSync={lastSync} onClick={() => {}} />
        </div>
        <div className="space-y-4">
          <div className="grid grid-cols-1 md:grid-cols-2 gap-3 text-sm">
            <div className="bg-ivory-deep/40 rounded-md p-3 ring-soft">
              <div className="text-[10px] uppercase text-ink-muted font-semibold tracking-wider">Repository</div>
              <div className="font-mono text-[12px] font-semibold text-ink mt-0.5 truncate">
                {vault.getRepo() ? `${vault.getRepo().owner}/${vault.getRepo().repo}` : '—'}
              </div>
            </div>
            <div className="bg-ivory-deep/40 rounded-md p-3 ring-soft">
              <div className="text-[10px] uppercase text-ink-muted font-semibold tracking-wider">Last sync</div>
              <div className="font-semibold text-ink mt-0.5">{syncTimeAgo}</div>
            </div>
            <div className="bg-ivory-deep/40 rounded-md p-3 ring-soft md:col-span-2">
              <div className="text-[10px] uppercase text-ink-muted font-semibold tracking-wider">Data file</div>
              <div className="font-mono text-[12px] font-semibold text-ink mt-0.5">data.json <span className="text-ink-muted font-normal">(AES-256 encrypted, branch: {vault.getRepo()?.branch || 'main'})</span></div>
              {vault.getRepo() && (
                <a href={`https://github.com/${vault.getRepo().owner}/${vault.getRepo().repo}/blob/${vault.getRepo().branch}/data.json`} target="_blank" rel="noopener noreferrer" className="text-[11px] text-teal-500 underline mt-1 inline-block font-medium">Open on GitHub →</a>
              )}
            </div>
          </div>
          <div className="flex flex-wrap gap-2">
            <Button variant="soft" onClick={onForceSync}><Icon name="upload" /> Force push to GitHub</Button>
            <Button variant="soft" onClick={onChangePassphrase}><Icon name="lock" /> Change passphrase</Button>
            <Button variant="soft" onClick={onChangeToken}><Icon name="refresh" /> Rotate GitHub token</Button>
          </div>
          <div className="text-[11px] text-ink-soft bg-clay-500/5 ring-1 ring-clay-500/20 rounded p-3">
            <span className="font-semibold text-clay-500">Forgot passphrase?</span> The data cannot be recovered. You would need to delete <code className="text-[11px] bg-ivory-deep px-1 rounded">data.json</code> from your GitHub repo and start fresh.
          </div>
        </div>
      </div>

      <div className="bg-ivory-warm rounded-xl ring-soft p-5">
        <div className="flex items-center justify-between mb-3">
          <div className="font-display text-lg text-teal-500">Maintenance Rates</div>
          <Button variant="soft" size="sm" onClick={applyRatesToFlats}>Apply to all flats</Button>
        </div>
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead className="text-[11px] uppercase tracking-wider text-ink-muted">
              <tr>
                <th className="text-left py-2">Tower</th>
                <th className="text-right">2BHK (₹)</th>
                <th className="text-right">3BHK (₹)</th>
                <th className="text-right pr-2">Shop (₹)</th>
              </tr>
            </thead>
            <tbody className="divide-soft">
              {[...TOWERS, 'Shops'].map(t => (
                <tr key={t}>
                  <td className="py-2 font-display text-teal-500">{t}</td>
                  <td className="text-right"><Input type="number" value={draft.rates[t]?.['2BHK'] ?? ''} onChange={e => updateRate(t, '2BHK', e.target.value)} disabled={t==='Shops'} className="w-32 ml-auto text-right" /></td>
                  <td className="text-right"><Input type="number" value={draft.rates[t]?.['3BHK'] ?? ''} onChange={e => updateRate(t, '3BHK', e.target.value)} disabled={t==='Shops'} className="w-32 ml-auto text-right" /></td>
                  <td className="text-right pr-2"><Input type="number" value={draft.rates[t]?.Shop ?? ''} onChange={e => updateRate(t, 'Shop', e.target.value)} disabled={t!=='Shops'} className="w-32 ml-auto text-right" /></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div className="mt-3 text-xs text-ink-muted">Saving here updates the master rates. Existing flats keep their current monthly amount unless you click <em>Apply to all flats</em>.</div>
        <div className="mt-3 flex justify-end"><Button onClick={save}>Save rates</Button></div>
      </div>

      <div className="bg-ivory-warm rounded-xl ring-soft p-5">
        <div className="font-display text-lg text-teal-500 mb-3">Backup &amp; Restore (Local file)</div>
        <div className="text-sm text-ink-muted mb-4">In addition to Drive sync, you can also keep a JSON file copy on any device. Useful for archives or moving data to a different Google account.</div>
        <div className="flex flex-wrap gap-2">
          <Button variant="outline" onClick={exportAll}><Icon name="download" /> Export backup (JSON)</Button>
          <input type="file" accept=".json" ref={fileRef} className="hidden" onChange={e => e.target.files[0] && importAll(e.target.files[0])} />
          <Button variant="soft" onClick={() => fileRef.current.click()}><Icon name="upload" /> Restore from backup</Button>
        </div>
      </div>

      <div className="bg-crimson-500/5 ring-1 ring-crimson-500/20 rounded-xl p-5">
        <div className="font-display text-lg text-crimson-500 mb-1">Danger zone</div>
        <div className="text-sm text-ink-soft mb-3">Permanently delete all flats, owners and payments and start over.</div>
        <Button variant="danger" onClick={resetAll}><Icon name="trash" /> Reset all data</Button>
      </div>
    </div>
  );
}

/* ===========================================================
   GITHUB SYNC — STATUS BADGE & SETUP MODAL
   =========================================================== */

function SyncStatusBadge({ status, lastSync, onClick }) {
  // status: 'disabled' | 'connecting' | 'connected' | 'syncing' | 'error' | 'offline'
  const map = {
    disabled:   { cls: 'bg-ivory-deep text-ink-muted ring-soft', dot: 'bg-ink-muted/50', label: 'Local only' },
    connecting: { cls: 'bg-clay-500/10 text-clay-600 ring-1 ring-clay-500/30', dot: 'bg-clay-500 animate-pulse', label: 'Connecting…' },
    syncing:    { cls: 'bg-teal-50 text-teal-600 ring-1 ring-teal-500/30', dot: 'bg-teal-500 animate-pulse', label: 'Syncing…' },
    connected:  { cls: 'bg-moss-500/10 text-moss-600 ring-1 ring-moss-500/30', dot: 'bg-moss-500', label: 'Synced' },
    offline:    { cls: 'bg-clay-500/10 text-clay-600 ring-1 ring-clay-500/30', dot: 'bg-clay-500', label: 'Offline' },
    error:      { cls: 'bg-crimson-500/10 text-crimson-600 ring-1 ring-crimson-500/30', dot: 'bg-crimson-500', label: 'Sync error' },
  };
  const m = map[status] || map.disabled;
  const timeAgo = (() => {
    if (!lastSync) return '';
    const s = Math.floor((Date.now() - lastSync) / 1000);
    if (s < 60) return 'just now';
    if (s < 3600) return `${Math.floor(s/60)}m ago`;
    if (s < 86400) return `${Math.floor(s/3600)}h ago`;
    return `${Math.floor(s/86400)}d ago`;
  })();
  return (
    <button onClick={onClick} className={`w-full text-left rounded-md px-3 py-2 inline-flex items-center gap-2 transition ${m.cls} hover:opacity-90`}>
      <span className={`w-2 h-2 rounded-full ${m.dot}`}></span>
      <span className="flex-1">
        <div className="font-semibold tracking-wider uppercase text-[11px]">{m.label}</div>
        {status === 'connected' && lastSync && <div className="text-[11px] opacity-80 normal-case font-normal mt-0.5">GitHub · {timeAgo}</div>}
      </span>
      <Icon name="cloud" className="w-4 h-4 opacity-70" />
    </button>
  );
}

// First-time setup: collect passphrase + GitHub token, initialize vault on GitHub.
function VaultSetupModal({ open, mode, onComplete, onSkip, toast, existingData }) {
  // mode: 'first-time' (no vault exists) | 'migrate' (legacy plain data on GitHub)
  const [step, setStep] = useState('intro'); // intro | passphrase | token | wiring | done
  const [pass1, setPass1] = useState('');
  const [pass2, setPass2] = useState('');
  const [token, setToken] = useState('');
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState('');

  // Auto-detect repo from URL
  const detected = vault.detectRepoFromURL();
  const [owner, setOwner] = useState(detected?.owner || '');
  const [repo, setRepo] = useState(detected?.repo || '');
  const [branch, setBranch] = useState('main');

  useEffect(() => {
    if (open) {
      setStep('intro'); setPass1(''); setPass2(''); setToken(''); setErr(''); setBusy(false);
    }
  }, [open]);

  const proceedToToken = () => {
    setErr('');
    if (pass1.length < 8) { setErr('Passphrase should be at least 8 characters'); return; }
    if (pass1 !== pass2) { setErr('Passphrases do not match'); return; }
    setStep('token');
  };

  const finish = async () => {
    setErr(''); setBusy(true);
    try {
      if (!token.trim().startsWith('ghp_') && !token.trim().startsWith('github_pat_')) {
        throw new Error('Token should start with "ghp_" or "github_pat_". Did you paste the full token?');
      }
      if (!owner.trim() || !repo.trim()) {
        throw new Error('GitHub username and repository name are required');
      }
      vault.setRepo({ owner: owner.trim(), repo: repo.trim(), branch: branch.trim() || 'main', path: 'data.json' });

      const initialData = existingData || {
        config: DEFAULT_CONFIG,
        flats: [],
        payments: [],
        expenses: [],
        staff: [],
      };
      await vault.initialize(token.trim(), pass1, initialData);
      setStep('done');
      setBusy(false);
      // small celebration moment
      setTimeout(() => { onComplete(initialData); }, 1500);
    } catch (e) {
      console.error('Vault init failed', e);
      setErr(e.message || String(e));
      setBusy(false);
    }
  };

  if (!open) return null;
  const isMigrate = mode === 'migrate';

  return (
    <div className="fixed inset-0 z-50 bg-ink/60 flex items-center justify-center px-4 anim-fade">
      <div className="bg-ivory-warm rounded-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto shadow-2xl anim-slide">
        <div className="p-6 border-b border-teal-500/10">
          <div className="text-[10px] tracking-[0.3em] uppercase text-clay-500 mb-1 font-semibold">{isMigrate ? 'Migrate to Encrypted Vault' : 'One-Time Setup'}</div>
          <div className="font-display text-2xl text-teal-500">
            {step === 'done' ? '✓ All set' : 'Connect this portal to your data file'}
          </div>
          <p className="text-sm text-ink-soft mt-1">
            {isMigrate
              ? 'We found unencrypted data on GitHub. Set a passphrase to encrypt it. Anyone with the URL would otherwise be able to read it.'
              : 'After this setup, you (or anyone else with the passphrase) can open this portal on any device with just the passphrase — no token needed.'}
          </p>
        </div>

        <div className="p-6 space-y-5">
          {/* Step indicator */}
          <div className="flex items-center gap-2 text-[11px] uppercase tracking-wider font-semibold">
            <span className={step === 'intro' ? 'text-teal-500' : 'text-ink-muted'}>1 · Intro</span>
            <span className="text-ink-muted">·</span>
            <span className={step === 'passphrase' ? 'text-teal-500' : step === 'token' || step === 'done' ? 'text-moss-500' : 'text-ink-muted'}>2 · Passphrase</span>
            <span className="text-ink-muted">·</span>
            <span className={step === 'token' ? 'text-teal-500' : step === 'done' ? 'text-moss-500' : 'text-ink-muted'}>3 · GitHub</span>
            <span className="text-ink-muted">·</span>
            <span className={step === 'done' ? 'text-moss-500' : 'text-ink-muted'}>4 · Done</span>
          </div>

          {step === 'intro' && (
            <div className="space-y-4">
              <div className="bg-ivory-deep/40 ring-soft rounded-lg p-4 text-[13px] text-ink-soft space-y-2">
                <div className="font-display text-base text-teal-500">How this works</div>
                <ul className="space-y-1.5 list-disc pl-5">
                  <li>All data — flats, payments, expenses, staff — lives in one encrypted file on GitHub: <code className="text-xs bg-ivory-warm rounded px-1">data.json</code></li>
                  <li>Encrypted with AES-256 using your passphrase. Public visibility is fine — the file is unreadable without it.</li>
                  <li>Your GitHub token is stored <em>inside</em> the encrypted file, so any device just needs the passphrase.</li>
                  <li>Auto-saves to GitHub a few seconds after every change.</li>
                </ul>
              </div>
              <div className="bg-clay-500/10 ring-1 ring-clay-500/20 rounded-lg p-4 text-[13px] text-ink-soft">
                <div className="font-medium text-clay-500 mb-1">⚠ Keep your passphrase safe</div>
                <p>If you lose the passphrase, the data cannot be recovered — only re-created from a fresh setup. Write it down somewhere outside the app.</p>
              </div>
              <div className="flex justify-end gap-2 pt-2">
                {!isMigrate && onSkip && <Button variant="ghost" onClick={onSkip}>Skip for now</Button>}
                <Button onClick={() => setStep('passphrase')}>Get started →</Button>
              </div>
            </div>
          )}

          {step === 'passphrase' && (
            <div className="space-y-4">
              <p className="text-sm text-ink-soft">
                Pick a passphrase. Strong is better — this is the only thing standing between data and the public internet. Mix words and numbers, at least 8 characters.
              </p>
              <Field label="Passphrase">
                <Input type="password" value={pass1} onChange={e => { setPass1(e.target.value); setErr(''); }} autoFocus placeholder="e.g. green-cottage-19-rupees" />
              </Field>
              <Field label="Confirm passphrase">
                <Input type="password" value={pass2} onChange={e => { setPass2(e.target.value); setErr(''); }} onKeyDown={e => e.key === 'Enter' && proceedToToken()} placeholder="Re-type to confirm" />
              </Field>
              {err && <div className="text-xs bg-crimson-500/10 ring-1 ring-crimson-500/30 text-crimson-600 rounded px-3 py-2 font-medium">{err}</div>}
              <div className="flex justify-between pt-1">
                <Button variant="ghost" onClick={() => setStep('intro')}>← Back</Button>
                <Button onClick={proceedToToken}>Continue →</Button>
              </div>
            </div>
          )}

          {step === 'token' && (
            <div className="space-y-4 text-sm">
              <p className="text-ink-soft">
                Now create a one-time GitHub token. After this, the token is encrypted inside the data file and you won't need it again on any device.
              </p>

              <div className="bg-ivory-deep/40 ring-soft rounded-lg p-4 space-y-3 text-[13px] text-ink-soft">
                <div className="font-display text-base text-teal-500">Quick steps</div>
                <ol className="space-y-1.5 list-decimal pl-5">
                  <li>Open <a href="https://github.com/settings/personal-access-tokens/new" target="_blank" rel="noopener noreferrer" className="text-teal-500 underline font-medium">github.com/settings/personal-access-tokens/new</a></li>
                  <li>Token name: <code className="bg-ivory-warm px-1 rounded">Society Maintenance Portal</code></li>
                  <li>Expiration: <strong>No expiration</strong> (or 1 year — you can rotate)</li>
                  <li>Repository access: <strong>Only select repositories</strong> → pick <code className="bg-ivory-warm px-1 rounded">{repo || 'your-repo'}</code></li>
                  <li>Permissions → Repository permissions → <strong>Contents: Read and write</strong></li>
                  <li>Click <strong>Generate token</strong>, copy it (starts with <code className="bg-ivory-warm px-1 rounded">github_pat_</code>) and paste below</li>
                </ol>
              </div>

              <Field label="GitHub Personal Access Token">
                <Input type="password" value={token} onChange={e => { setToken(e.target.value); setErr(''); }} placeholder="github_pat_..." />
              </Field>

              <div className="grid grid-cols-3 gap-2">
                <Field label="GitHub username"><Input value={owner} onChange={e => setOwner(e.target.value)} /></Field>
                <Field label="Repository"><Input value={repo} onChange={e => setRepo(e.target.value)} /></Field>
                <Field label="Branch"><Input value={branch} onChange={e => setBranch(e.target.value)} placeholder="main" /></Field>
              </div>
              <div className="text-[11px] text-ink-muted">Auto-detected from this page's URL. Override if data lives in a different repo than this app.</div>

              {err && <div className="text-xs bg-crimson-500/10 ring-1 ring-crimson-500/30 text-crimson-600 rounded px-3 py-2 font-medium">{err}</div>}

              <div className="flex justify-between pt-1">
                <Button variant="ghost" onClick={() => setStep('passphrase')} disabled={busy}>← Back</Button>
                <Button onClick={finish} disabled={busy}>
                  {busy ? 'Encrypting & uploading…' : (isMigrate ? 'Migrate & encrypt' : 'Initialize vault')}
                </Button>
              </div>
            </div>
          )}

          {step === 'done' && (
            <div className="text-center py-8 anim-fade">
              <div className="w-16 h-16 mx-auto mb-4 rounded-full bg-moss-500/10 ring-2 ring-moss-500 flex items-center justify-center">
                <Icon name="check" className="w-8 h-8 text-moss-500" />
              </div>
              <div className="font-display text-2xl text-teal-500 mb-2">Vault ready</div>
              <p className="text-sm text-ink-soft max-w-md mx-auto">
                Your data is encrypted on GitHub. From now on, just enter the passphrase to access it from any device.
              </p>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// Vault lock screen — fetches encrypted vault file, decrypts on passphrase submit
function VaultLockScreen({ society, vaultFile, onUnlock, onReset, onRefetch }) {
  const [pw, setPw] = useState('');
  const [err, setErr] = useState('');
  const [busy, setBusy] = useState(false);

  const submit = async () => {
    if (!pw) return;
    setBusy(true); setErr('');
    try {
      const inner = await vault.unlock(vaultFile, pw);
      auth.startSession();
      onUnlock(inner);
    } catch (e) {
      setErr(e.message === 'Wrong passphrase' ? 'Incorrect passphrase. Try again.' : e.message);
      setBusy(false);
    }
  };

  return (
    <div className="min-h-screen flex items-center justify-center px-4 grain">
      <div className="bg-ivory-warm rounded-2xl ring-soft p-8 w-full max-w-sm shadow-xl">
        <div className="text-center mb-6">
          <div className="text-[10px] tracking-[0.3em] uppercase text-clay-500 mb-2 font-semibold">A/RWA Treasury</div>
          <div className="font-display text-2xl text-teal-500 leading-tight">{society || 'Sushma Joynest Moh 1'}</div>
          <div className="text-xs text-ink-soft mt-1">Maintenance Portal</div>
        </div>
        <Field label="Passphrase">
          <Input
            type="password"
            value={pw}
            onChange={e => { setPw(e.target.value); setErr(''); }}
            onKeyDown={e => e.key === 'Enter' && submit()}
            autoFocus
            placeholder="Enter passphrase"
            disabled={busy}
          />
        </Field>
        {err && <div className="text-xs bg-crimson-500/10 ring-1 ring-crimson-500/30 text-crimson-600 rounded px-3 py-2 mt-3 font-medium">{err}</div>}
        <Button onClick={submit} disabled={busy || !pw} className="w-full mt-4">
          <Icon name="lock" /> {busy ? 'Decrypting…' : 'Unlock'}
        </Button>
        <div className="mt-4 flex justify-between text-[11px]">
          <button onClick={onRefetch} className="text-teal-500 hover:underline">Refresh</button>
          {onReset && (
            <button onClick={onReset} className="text-ink-muted hover:text-crimson-500">Forgot passphrase?</button>
          )}

// Change passphrase modal — re-encrypts vault with new passphrase
function ChangePassphraseModal({ open, onClose, onChanged, toast, snapshotFn }) {
  const [current, setCurrent] = useState('');
  const [p1, setP1] = useState('');
  const [p2, setP2] = useState('');
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState('');

  useEffect(() => { if (open) { setCurrent(''); setP1(''); setP2(''); setErr(''); } }, [open]);

  const submit = async () => {
    setErr('');
    if (current !== vault.passphrase) { setErr('Current passphrase is incorrect'); return; }
    if (p1.length < 8) { setErr('New passphrase should be at least 8 characters'); return; }
    if (p1 !== p2) { setErr('New passphrases do not match'); return; }
    setBusy(true);
    try {
      vault.passphrase = p1; // switch
      const snap = snapshotFn();
      await vault.save(snap, 'Change passphrase');
      onChanged();
      toast('Passphrase changed', 'success');
      onClose();
    } catch (e) {
      setErr('Failed to save: ' + e.message);
      vault.passphrase = current; // revert
    } finally {
      setBusy(false);
    }
  };

  if (!open) return null;
  return (
    <Modal open onClose={onClose} title="Change Passphrase" maxWidth="max-w-md">
      <div className="space-y-3 text-sm">
        <Field label="Current passphrase"><Input type="password" value={current} onChange={e => setCurrent(e.target.value)} autoFocus /></Field>
        <Field label="New passphrase"><Input type="password" value={p1} onChange={e => setP1(e.target.value)} /></Field>
        <Field label="Confirm new passphrase"><Input type="password" value={p2} onChange={e => setP2(e.target.value)} onKeyDown={e => e.key === 'Enter' && submit()} /></Field>
        {err && <div className="text-xs bg-crimson-500/10 ring-1 ring-crimson-500/30 text-crimson-600 rounded px-3 py-2 font-medium">{err}</div>}
        <div className="flex justify-between pt-2">
          <Button variant="ghost" onClick={onClose} disabled={busy}>Cancel</Button>
          <Button onClick={submit} disabled={busy}>{busy ? 'Re-encrypting…' : 'Change passphrase'}</Button>
        </div>
      </div>
    </Modal>
  );
}

// Change-token modal — re-encrypts vault with a new GitHub token (passphrase stays)
function ChangeTokenModal({ open, onClose, onChanged, toast, snapshotFn }) {
  const [token, setToken] = useState('');
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState('');
  useEffect(() => { if (open) { setToken(''); setErr(''); } }, [open]);
  const submit = async () => {
    setErr('');
    if (!token.trim().startsWith('ghp_') && !token.trim().startsWith('github_pat_')) {
      setErr('Token should start with "ghp_" or "github_pat_"');
      return;
    }
    setBusy(true);
    const oldToken = vault.token;
    vault.token = token.trim();
    try {
      await vault.fetchWithSha(); // test
      const snap = snapshotFn();
      await vault.save(snap, 'Rotate GitHub token');
      onChanged();
      toast('GitHub token updated', 'success');
      onClose();
    } catch (e) {
      vault.token = oldToken;
      setErr('Failed: ' + e.message);
    } finally {
      setBusy(false);
    }
  };
  if (!open) return null;
  return (
    <Modal open onClose={onClose} title="Change GitHub Token" maxWidth="max-w-md">
      <div className="space-y-3 text-sm">
        <p className="text-ink-soft">Paste a new Personal Access Token. The old one will be replaced inside the encrypted vault.</p>
        <Field label="New token">
          <Input type="password" value={token} onChange={e => setToken(e.target.value)} placeholder="github_pat_..." autoFocus />
        </Field>
        {err && <div className="text-xs bg-crimson-500/10 ring-1 ring-crimson-500/30 text-crimson-600 rounded px-3 py-2 font-medium">{err}</div>}
        <div className="flex justify-between pt-2">
          <Button variant="ghost" onClick={onClose} disabled={busy}>Cancel</Button>
          <Button onClick={submit} disabled={busy}>{busy ? 'Updating…' : 'Update token'}</Button>
        </div>
      </div>
    </Modal>
  );
}

      if (filter.role !== 'all' && s.role !== filter.role) return false;
      if (filter.status === 'active' && !s.is_active) return false;
      if (filter.status === 'inactive' && s.is_active) return false;
      if (q && !`${s.name} ${s.phone} ${s.notes}`.toLowerCase().includes(q)) return false;
      return true;
    });
