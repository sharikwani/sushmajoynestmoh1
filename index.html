        if (filter.scope === 'year') {
          const y = filter.period.slice(0, 4);
          if (!e.period?.startsWith(y) && !e.date?.startsWith(y)) return false;
        }
        if (filter.category !== 'all' && e.category !== filter.category) return false;
        if (filter.mode !== 'all' && e.mode !== filter.mode) return false;
        if (q) {
          const hay = `${e.category} ${e.subcategory} ${e.payee_name} ${e.notes} ${e.reference_no}`.toLowerCase();
          if (!hay.includes(q)) return false;
        }
        return true;
      })
      .sort((a, b) => (b.date || '').localeCompare(a.date || ''));
  }, [expenses, filter]);

  useEffect(() => { setPage(0); }, [filter]);
  const slice = filtered.slice(page * PAGE, page * PAGE + PAGE);

  const totals = useMemo(() => {
    const byCategory = {};
    let total = 0;
    filtered.forEach(e => {
      byCategory[e.category] = (byCategory[e.category] || 0) + e.amount;
      total += e.amount;
    });
    return { total, byCategory };
  }, [filtered]);

  const handleSave = (e) => {
    if (e.id && expenses.some(x => x.id === e.id)) {
      updateExpense(e.id, e);
      toast('Expense updated', 'success');
    } else {
      addExpense(e);
      toast(`Expense of ${inr(e.amount)} recorded`, 'success');
    }
    setEditing(null);
    setShowAdd(false);
  };

  const handleDelete = (e) => {
    if (!confirm(`Delete this ${e.category} expense of ${inr(e.amount)}?`)) return;
    deleteExpense(e.id);
    toast('Expense deleted', 'success');
  };

  const exportCSV = () => {
    const rows = filtered.map(e => ({
      date: e.date, category: e.category, subcategory: e.subcategory || '',
      payee: e.payee_name || '', amount: e.amount, mode: e.mode,
      reference: e.reference_no || '', period: e.period || '', notes: e.notes || '',
    }));
    download(`expenses-${todayISO()}.csv`, toCSV(rows), 'text/csv');
    toast(`Exported ${rows.length} expenses`, 'success');
  };

  const periodLabelText = filter.scope === 'year' ? filter.period.slice(0, 4)
    : filter.scope === 'all' ? 'all time' : periodLabel(filter.period);

  return (
    <div className="space-y-5">
      <div className="flex flex-wrap items-end justify-between gap-4">
        <div>
          <div className="text-[11px] uppercase tracking-[0.2em] text-clay-500 font-semibold mb-1">Money Out</div>
          <h1 className="font-display text-4xl text-ink leading-none">Expenses</h1>
          <p className="text-sm text-ink-soft mt-1.5">
            {filtered.length} entries · <span className="font-mono font-bold text-crimson-500">{inr(totals.total)}</span> spent in {periodLabelText}
          </p>
        </div>
        <div className="flex gap-2">
          <Button variant="outline" onClick={exportCSV}><Icon name="download" /> Export CSV</Button>
          <Button onClick={() => { setEditing(null); setShowAdd(true); }}><Icon name="plus" /> Add Expense</Button>
        </div>
      </div>

      {/* Category summary cards */}
      {filtered.length > 0 && (
        <div className="bg-ivory-warm rounded-xl ring-soft p-4">
          <div className="text-[11px] uppercase tracking-wider text-ink-soft font-semibold mb-3">Breakdown — {periodLabelText}</div>
          <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-2">
            {Object.entries(totals.byCategory).sort((a,b) => b[1]-a[1]).map(([cat, amt]) => {
              const meta = EXPENSE_CATEGORIES.find(c => c.value === cat);
              const pct = totals.total > 0 ? (amt / totals.total) * 100 : 0;
              return (
                <div key={cat} className="bg-ivory-deep/40 rounded-lg p-3 ring-soft">
                  <div className="text-base mb-0.5">{meta?.icon || '📦'}</div>
                  <div className="text-[11px] text-ink-soft font-medium truncate" title={cat}>{cat}</div>
                  <div className="font-mono font-bold text-ink tabular text-sm mt-1">{inr(amt)}</div>
                  <div className="text-[10px] text-ink-muted">{pct.toFixed(0)}%</div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Filters */}
      <div className="bg-ivory-warm rounded-xl ring-soft p-4 grid grid-cols-2 md:grid-cols-5 gap-3">
        <div className="md:col-span-2 relative">
          <Icon name="search" className="absolute left-3 top-1/2 -translate-y-1/2 text-ink-muted w-4 h-4" />
          <input value={filter.q} onChange={e => setFilter({...filter, q: e.target.value})} placeholder="Search payee, description…" className="w-full pl-9 pr-3 py-2 bg-ivory-deep/40 ring-soft rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-teal-500/50" />
        </div>
        <Select value={filter.scope} onChange={e => setFilter({...filter, scope: e.target.value})}>
          <option value="month">Single month</option>
          <option value="year">Whole year</option>
          <option value="all">All time</option>
        </Select>
        <Input type="month" value={filter.period} onChange={e => setFilter({...filter, period: e.target.value})} disabled={filter.scope === 'all'} />
        <Select value={filter.category} onChange={e => setFilter({...filter, category: e.target.value})}>
          <option value="all">All categories</option>
          {EXPENSE_CATEGORIES.map(c => <option key={c.value} value={c.value}>{c.icon} {c.value}</option>)}
        </Select>
      </div>

      {/* Table */}
      <div className="bg-ivory-warm rounded-xl ring-soft overflow-hidden">
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead className="bg-ivory-deep/60">
              <tr>
                <th className="text-left px-5 py-2.5">Date</th>
                <th className="text-left">Category</th>
                <th className="text-left">Payee</th>
                <th className="text-left">Description</th>
                <th className="text-right">Amount</th>
                <th className="text-left">Mode</th>
                <th className="text-left">For Month</th>
                <th className="text-right pr-5"></th>
              </tr>
            </thead>
            <tbody className="divide-soft">
              {slice.length === 0 && <tr><td colSpan="8" className="text-center py-10 text-ink-soft">No expenses match.</td></tr>}
              {slice.map(e => {
                const meta = EXPENSE_CATEGORIES.find(c => c.value === e.category);
                return (
                  <tr key={e.id} className="hover:bg-ivory-deep/40">
                    <td className="px-5 py-2.5 tabular text-ink-soft">{e.date}</td>
                    <td><span className="chip chip-info">{meta?.icon} {e.category}</span></td>
                    <td className="text-ink font-medium">{e.payee_name || '—'}</td>
                    <td className="text-ink-soft max-w-[200px] truncate" title={e.subcategory}>{e.subcategory || '—'}</td>
                    <td className="text-right tabular font-bold text-crimson-500">{inr(e.amount)}</td>
                    <td className="text-ink-soft text-xs">{e.mode}</td>
                    <td className="text-ink-soft text-xs">{e.period ? periodLabel(e.period) : '—'}</td>
                    <td className="text-right pr-5">
                      <div className="flex gap-1 justify-end">
                        <button onClick={() => { setEditing(e); setShowAdd(true); }} className="p-1.5 rounded hover:bg-ivory-deep text-ink-muted hover:text-teal-500"><Icon name="edit" /></button>
                        <button onClick={() => handleDelete(e)} className="p-1.5 rounded hover:bg-crimson-500/10 text-ink-muted hover:text-crimson-500"><Icon name="trash" /></button>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
        {filtered.length > PAGE && (
          <div className="px-5 py-3 flex items-center justify-between text-xs bg-ivory-deep/40 border-t border-teal-500/10">
            <div className="text-ink-soft">Page {page+1} of {Math.ceil(filtered.length/PAGE)}</div>
            <div className="flex gap-2">
              <Button size="sm" variant="ghost" disabled={page===0} onClick={() => setPage(p => p-1)}>Prev</Button>
              <Button size="sm" variant="ghost" disabled={(page+1)*PAGE >= filtered.length} onClick={() => setPage(p => p+1)}>Next</Button>
            </div>
          </div>
        )}
      </div>

      <ExpenseModal open={showAdd} expense={editing} staff={staff} currentPeriod={currentPeriod} onSave={handleSave} onClose={() => { setShowAdd(false); setEditing(null); }} />
    </div>
  );
}

/* ===========================================================
   ROOT APP
   =========================================================== */


function App() {
  // ----- Stage of the app -----
  // 'loading'        — fetching the vault file from GitHub
  // 'load-error'     — vault fetch failed
  // 'first-time'     — no vault file exists, show setup wizard
  // 'migrate'        — old plain JSON found, migrate to encrypted
  // 'locked'         — vault exists, waiting for passphrase
  // 'ready'          — vault unlocked, app is usable
  const [stage, setStage] = useState('loading');
  const [vaultFile, setVaultFile] = useState(null); // raw vault file from GitHub
  const [loadError, setLoadError] = useState('');
  const [legacyData, setLegacyData] = useState(null); // for migration

  const [flats, setFlats] = useState([]);
  const [payments, setPayments] = useState([]);
  const [expenses, setExpenses] = useState([]);
  const [staff, setStaff] = useState([]);
  const [config, setConfig] = useState(DEFAULT_CONFIG);
  const [view, setView] = useState('dashboard');
  const [currentPeriod, setCurrentPeriod] = useState(getCurrentPeriod());
  const [toast, setToast] = useState(null);

  // Sync state
  const [syncStatus, setSyncStatus] = useState('disabled');
  const [lastSync, setLastSync] = useState(null);

  // Modals
  const [showChangePw, setShowChangePw] = useState(false);
  const [showChangeToken, setShowChangeToken] = useState(false);

  const showToast = useCallback((message, type='info') => {
    setToast({ message, type });
    setTimeout(() => setToast(null), 2800);
  }, []);

  const recordSync = () => setLastSync(Date.now());

  // Apply decrypted vault contents to app state
  const applyVaultData = useCallback((data) => {
    if (!data) return;
    if (data.config) setConfig({ ...DEFAULT_CONFIG, ...data.config });
    if (Array.isArray(data.flats)) setFlats(data.flats);
    if (Array.isArray(data.payments)) {
      try { setPayments(data.payments.filter(x => x && typeof x === 'object').map(migratePayment)); }
      catch (e) { console.error('Payment migration failed', e); setPayments([]); }
    }
    if (Array.isArray(data.expenses)) setExpenses(data.expenses);
    if (Array.isArray(data.staff)) setStaff(data.staff);
  }, []);

  // Build snapshot of current state for saving
  const buildSnapshot = useCallback(() => ({
    config, flats, payments, expenses, staff,
    updated_at: nowISO(),
    version: 3,
  }), [config, flats, payments, expenses, staff]);

  // ---- Initial load: fetch vault file ----
  const attemptLoad = useCallback(async () => {
    setStage('loading');
    setLoadError('');
    try {
      const repo = vault.getRepo();
      if (!repo || !repo.owner || !repo.repo) {
        // Can't auto-detect — go straight to first-time setup
        setStage('first-time');
        return;
      }
      const { data, isFirstTime, isLegacy } = await vault.load();
      if (isFirstTime) {
        setStage('first-time');
      } else if (isLegacy) {
        // Old plain JSON — needs migration
        setLegacyData(data);
        setStage('migrate');
      } else {
        // Encrypted vault — show lock screen
        setVaultFile(data);
        setStage('locked');
      }
    } catch (e) {
      console.error('Vault load failed', e);
      setLoadError(e.message || String(e));
      setStage('load-error');
    }
  }, []);

  useEffect(() => {
    // Safety net — never let loading hang forever
    const safety = setTimeout(() => {
      setStage(prev => prev === 'loading' ? 'load-error' : prev);
      setLoadError(prev => prev || 'Loading took unusually long. Network may be slow or the data file is unreachable.');
    }, 15000);
    attemptLoad().finally(() => clearTimeout(safety));
    return () => clearTimeout(safety);
  }, [attemptLoad]);

  // ---- Auto-push to GitHub on data change (debounced) ----
  const pushTimer = useRef(null);
  const schedulePush = useCallback(() => {
    if (!vault.isUnlocked()) return;
    clearTimeout(pushTimer.current);
    pushTimer.current = setTimeout(async () => {
      if (!vault.isUnlocked()) return;
      try {
        setSyncStatus('syncing');
        await vault.save(buildSnapshot());
        recordSync();
        setSyncStatus('connected');
      } catch (e) {
        console.error('Save failed', e);
        setSyncStatus('error');
        showToast('Save failed: ' + e.message, 'error');
      }
    }, 2500);
  }, [buildSnapshot, showToast]);

  // Trigger save on data changes (only when app is ready)
  useEffect(() => { if (stage === 'ready') schedulePush(); }, [flats, stage, schedulePush]);
  useEffect(() => { if (stage === 'ready') schedulePush(); }, [payments, stage, schedulePush]);
  useEffect(() => { if (stage === 'ready') schedulePush(); }, [expenses, stage, schedulePush]);
  useEffect(() => { if (stage === 'ready') schedulePush(); }, [staff, stage, schedulePush]);
  useEffect(() => { if (stage === 'ready') schedulePush(); }, [config, stage, schedulePush]);

  // ---- First-time setup completion ----
  const handleFirstTimeComplete = useCallback((data) => {
    applyVaultData(data);
    setSyncStatus('connected');
    recordSync();
    setStage('ready');
    showToast('Vault initialised on GitHub', 'success');
  }, [applyVaultData, showToast]);

  // ---- Migration: take legacy plain data, encrypt and re-upload ----
  const handleMigrateComplete = useCallback((data) => {
    // After migrate, the legacy fields are now inside the encrypted vault
    applyVaultData({
      config: legacyData?.config || DEFAULT_CONFIG,
      flats: legacyData?.flats || [],
      payments: legacyData?.payments || [],
      expenses: legacyData?.expenses || [],
      staff: legacyData?.staff || [],
    });
    setSyncStatus('connected');
    recordSync();
    setStage('ready');
    showToast('Data migrated to encrypted vault', 'success');
  }, [legacyData, applyVaultData, showToast]);

  // ---- Lock screen unlock ----
  const handleUnlock = useCallback((decryptedData) => {
    applyVaultData(decryptedData);
    setSyncStatus('connected');
    recordSync();
    setStage('ready');
  }, [applyVaultData]);

  // ---- Manual lock (logout) ----
  const lockApp = useCallback(() => {
    vault.lock();
    auth.endSession();
    setFlats([]); setPayments([]); setExpenses([]); setStaff([]); setConfig(DEFAULT_CONFIG);
    setStage('locked');
  }, []);

  // ---- Initial society setup (generate flats) ----
  const initializeSociety = async () => {
    const newFlats = generateFlats();
    setFlats(newFlats);
    showToast(`Society initialised with ${newFlats.length} units`, 'success');
  };

  // ---- Mutators ----
  const addPayments = (list) => setPayments(prev => [...prev, ...list]);
  const deletePayment = (id) => setPayments(prev => prev.filter(p => p.id !== id));
  const addExpense = (e) => setExpenses(prev => [...prev, e]);
  const updateExpense = (id, patch) => setExpenses(prev => prev.map(e => e.id === id ? { ...e, ...patch } : e));
  const deleteExpense = (id) => setExpenses(prev => prev.filter(e => e.id !== id));
  const addStaffMember = (s) => setStaff(prev => [...prev, s]);
  const updateStaff = (id, patch) => setStaff(prev => prev.map(s => s.id === id ? { ...s, ...patch } : s));
  const deleteStaff = (id) => setStaff(prev => prev.filter(s => s.id !== id));

  const handleSyncBadgeClick = useCallback(async () => {
    if (stage !== 'ready') return;
    try {
      setSyncStatus('syncing');
      const text = await vault.fetchRaw();
      if (text) {
        const parsed = JSON.parse(text);
        const inner = await vault.unlock(parsed, vault.passphrase);
        applyVaultData(inner);
        recordSync();
        setSyncStatus('connected');
        showToast('Pulled latest from GitHub', 'success');
      }
    } catch (e) {
      setSyncStatus('error');
      showToast('Refresh failed: ' + e.message, 'error');
    }
  }, [stage, applyVaultData, showToast]);

  const defaulterCount = useMemo(() => {
    const occupied = flats.filter(f => f.occupancy !== 'Vacant');
    return occupied.filter(f => paidByFlatInPeriod(payments, f.flat_no, currentPeriod) < f.monthly_amount).length;
  }, [flats, payments, currentPeriod]);

  // ============== RENDER ==============

  // Stage: loading
  if (stage === 'loading') {
    return (
      <div className="min-h-screen flex items-center justify-center px-4">
        <div className="text-center max-w-md">
          <div className="font-display text-3xl text-teal-500 mb-2">Sushma Joynest Moh 1</div>
          <div className="text-ink-soft text-sm">Fetching encrypted vault from GitHub…</div>
        </div>
      </div>
    );
  }

  // Stage: load error
  if (stage === 'load-error') {
    return (
      <div className="min-h-screen flex items-center justify-center px-4">
        <div className="bg-ivory-warm rounded-2xl ring-soft p-8 max-w-md text-center">
          <div className="font-display text-2xl text-crimson-500 mb-2">Cannot load vault</div>
          <p className="text-sm text-ink-soft mb-4">{loadError}</p>
          <div className="bg-ivory-deep/40 rounded-lg p-3 text-[12px] text-ink-soft text-left mb-4">
            <div className="font-semibold mb-1">Common causes:</div>
            <ul className="list-disc pl-5 space-y-0.5">
              <li>No internet connection</li>
              <li>Hosted from an unrecognized URL (not <code>github.io</code>)</li>
              <li>The repo is private (data file must be on a public repo to fetch)</li>
            </ul>
          </div>
          <div className="flex gap-2 justify-center">
            <Button onClick={attemptLoad}><Icon name="refresh" /> Retry</Button>
            <Button variant="ghost" onClick={() => setStage('first-time')}>Set up from scratch</Button>
          </div>
        </div>
      </div>
    );
  }

  // Stage: first-time setup
  if (stage === 'first-time') {
    return <VaultSetupModal open mode="first-time" onComplete={handleFirstTimeComplete} toast={showToast} />;
  }

  // Stage: migrate legacy plain data
  if (stage === 'migrate') {
    return (
      <VaultSetupModal
        open
        mode="migrate"
        existingData={{
          config: legacyData?.config,
          flats: legacyData?.flats || [],
          payments: legacyData?.payments || [],
          expenses: legacyData?.expenses || [],
          staff: legacyData?.staff || [],
        }}
        onComplete={handleMigrateComplete}
        toast={showToast}
      />
    );
  }

  // Stage: locked
  if (stage === 'locked') {
    return (
      <VaultLockScreen
        society={config.society_name}
        vaultFile={vaultFile}
        onUnlock={handleUnlock}
        onRefetch={attemptLoad}
        onReset={() => {
          if (!confirm('This will NOT erase data on GitHub — only this device\'s session. You will still need the passphrase to unlock the vault. Continue?')) return;
          auth.endSession();
          location.reload();
        }}
      />
    );
  }

  // Stage: ready — main app
  // If no flats yet, show onboarding (rare case: vault was initialized empty)
  if (flats.length === 0) {
    return <Onboarding onInitialize={initializeSociety} />;
  }

  return (
    <div className="min-h-screen flex grain">
      <Sidebar
        view={view} setView={setView} society={config}
        defaulterCount={defaulterCount} currentPeriod={currentPeriod}
        driveStatus={syncStatus} driveLastSync={lastSync}
        onDriveBadgeClick={handleSyncBadgeClick}
        onLogout={lockApp}
        hasPw={true}
      />
      <main className="flex-1 px-6 py-8 max-w-[1400px]">
        {view === 'dashboard' && <Dashboard flats={flats} payments={payments} expenses={expenses} currentPeriod={currentPeriod} setView={setView} setCurrentPeriod={setCurrentPeriod} />}
        {view === 'flats' && <FlatsView flats={flats} setFlats={setFlats} payments={payments} currentPeriod={currentPeriod} rates={config.rates} toast={showToast} />}
        {view === 'record' && <RecordPayment flats={flats} payments={payments} addPayments={addPayments} currentPeriod={currentPeriod} config={config} setConfig={setConfig} toast={showToast} setView={setView} />}
        {view === 'history' && <PaymentHistory payments={payments} flats={flats} deletePayment={deletePayment} toast={showToast} />}
        {view === 'defaulters' && <Defaulters flats={flats} payments={payments} currentPeriod={currentPeriod} config={config} toast={showToast} />}
        {view === 'expenses' && <ExpensesView expenses={expenses} addExpense={addExpense} updateExpense={updateExpense} deleteExpense={deleteExpense} staff={staff} currentPeriod={currentPeriod} toast={showToast} />}
        {view === 'staff' && <StaffView staff={staff} addStaff={addStaffMember} updateStaff={updateStaff} deleteStaff={deleteStaff} expenses={expenses} addExpense={addExpense} currentPeriod={currentPeriod} toast={showToast} />}
        {view === 'reports' && <Reports flats={flats} payments={payments} expenses={expenses} currentPeriod={currentPeriod} config={config} />}
        {view === 'settings' && (
          <Settings
            config={config} setConfig={setConfig}
            flats={flats} setFlats={setFlats}
            payments={payments} setPayments={setPayments}
            expenses={expenses} setExpenses={setExpenses}
            staff={staff} setStaff={setStaff}
            toast={showToast}
            syncStatus={syncStatus} lastSync={lastSync}
            onChangePassphrase={() => setShowChangePw(true)}
            onChangeToken={() => setShowChangeToken(true)}
            onForceSync={async () => {
              try {
                setSyncStatus('syncing');
                await vault.save(buildSnapshot(), 'Manual push from Settings');
                recordSync();
                setSyncStatus('connected');
                showToast('Pushed all data to GitHub', 'success');
              } catch (e) {
                setSyncStatus('error');
                showToast('Push failed: ' + e.message, 'error');
              }
            }}
          />
        )}
      </main>
      <Toast toast={toast} />
      <ChangePassphraseModal open={showChangePw} onClose={() => setShowChangePw(false)} onChanged={() => {}} toast={showToast} snapshotFn={buildSnapshot} />
      <ChangeTokenModal open={showChangeToken} onClose={() => setShowChangeToken(false)} onChanged={() => {}} toast={showToast} snapshotFn={buildSnapshot} />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
