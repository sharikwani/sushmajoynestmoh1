function Reports({ flats, payments, currentPeriod, config }) {
  const [period, setPeriod] = useState(currentPeriod);
  const [year, setYear] = useState(parsePeriod(currentPeriod).y);

  const monthlySummary = useMemo(() => {
    const occupied = flats.filter(f => f.occupancy !== 'Vacant');
    const expected = occupied.reduce((s,f) => s + f.monthly_amount, 0);
    // Allocate per-period amounts to this period across all payments
    let collected = 0;
    const byMode = {};
    const paidByFlat = {};
    payments.forEach(p => {
      const amt = paymentAmountForPeriod(p, period);
      if (amt <= 0) return;
      collected += amt;
      byMode[p.mode] = (byMode[p.mode] || 0) + amt;
      paidByFlat[p.flat_no] = (paidByFlat[p.flat_no] || 0) + amt;
    });
    const byTower = {};
    ['A','B','C','D','J','K','L','M','Shops'].forEach(t => {
      const fs = occupied.filter(f => f.tower === t);
      const exp = fs.reduce((s,f) => s + f.monthly_amount, 0);
      const col = fs.reduce((s,f) => s + (paidByFlat[f.flat_no] || 0), 0);
      const defaulters = fs.filter(f => !paidByFlat[f.flat_no]).length;
      byTower[t] = { expected: exp, collected: col, defaulters, units: fs.length };
    });
    return { expected, collected, pending: expected - collected, byMode, byTower };
  }, [flats, payments, period]);

  const yearData = useMemo(() => {
    const months = [];
    for (let m = 1; m <= 12; m++) {
      const p = `${year}-${String(m).padStart(2,'0')}`;
      const c = collectedForPeriod(payments, p);
      months.push({ month: monthNames[m-1], period: p, collected: c });
    }
    const total = months.reduce((s,m) => s + m.collected, 0);
    const max = Math.max(1, ...months.map(m => m.collected));
    return { months, total, max };
  }, [payments, year]);

  return (
    <div className="space-y-6">
      <div className="flex flex-wrap items-end justify-between gap-4 no-print">
        <div>
          <div className="text-[11px] uppercase tracking-[0.2em] text-clay-500 mb-1">Reports</div>
          <h1 className="font-display text-4xl text-ink leading-none">Treasury Reports</h1>
          <p className="text-sm text-ink-muted mt-1.5">Monthly snapshots, yearly trends and printable summaries.</p>
        </div>
        <Button variant="outline" onClick={() => window.print()}><Icon name="print" /> Print page</Button>
      </div>

      <div className="bg-ivory-warm rounded-xl ring-soft p-5">
        <div className="flex flex-wrap items-end justify-between gap-3 mb-4">
          <div>
            <div className="text-[11px] uppercase tracking-wider text-ink-muted">Monthly Summary</div>
            <div className="font-display text-2xl text-ink">{periodLabelFull(period)}</div>
          </div>
          <Field label="Period"><Input type="month" value={period} onChange={e => setPeriod(e.target.value)} /></Field>
        </div>
        <div className="grid grid-cols-3 gap-3 mb-5">
          <div className="bg-teal-50/60 rounded-lg p-4">
            <div className="text-[10px] uppercase text-ink-muted">Expected</div>
            <div className="font-display text-2xl text-teal-500 tabular">{inr(monthlySummary.expected)}</div>
          </div>
          <div className="bg-moss-500/10 rounded-lg p-4">
            <div className="text-[10px] uppercase text-ink-muted">Collected</div>
            <div className="font-display text-2xl text-moss-500 tabular">{inr(monthlySummary.collected)}</div>
          </div>
          <div className="bg-crimson-500/10 rounded-lg p-4">
            <div className="text-[10px] uppercase text-ink-muted">Pending</div>
            <div className="font-display text-2xl text-crimson-500 tabular">{inr(monthlySummary.pending)}</div>
          </div>
        </div>

        <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
          <div>
            <div className="text-[11px] uppercase tracking-wider text-ink-muted mb-2">By Tower</div>
            <table className="w-full text-sm">
              <thead className="text-[10px] uppercase text-ink-muted border-b border-teal-500/15">
                <tr>
                  <th className="text-left py-1.5">Tower</th>
                  <th className="text-right">Expected</th>
                  <th className="text-right">Collected</th>
                  <th className="text-right">Defaulters</th>
                </tr>
              </thead>
              <tbody className="divide-soft">
                {Object.entries(monthlySummary.byTower).map(([t, v]) => (
                  <tr key={t}>
                    <td className="py-1.5 font-display text-teal-500">{t}</td>
                    <td className="text-right tabular">{inr(v.expected)}</td>
                    <td className="text-right tabular text-moss-500">{inr(v.collected)}</td>
                    <td className="text-right tabular">{v.defaulters}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div>
            <div className="text-[11px] uppercase tracking-wider text-ink-muted mb-2">By Mode of Payment</div>
            {Object.keys(monthlySummary.byMode).length === 0 ? (
              <div className="text-sm text-ink-muted py-6 text-center">No payments yet for this period.</div>
            ) : (
              <table className="w-full text-sm">
                <thead className="text-[10px] uppercase text-ink-muted border-b border-teal-500/15">
                  <tr><th className="text-left py-1.5">Mode</th><th className="text-right">Amount</th><th className="text-right">Share</th></tr>
                </thead>
                <tbody className="divide-soft">
                  {Object.entries(monthlySummary.byMode).sort((a,b)=>b[1]-a[1]).map(([m,v]) => (
                    <tr key={m}>
                      <td className="py-1.5">{m}</td>
                      <td className="text-right tabular">{inr(v)}</td>
                      <td className="text-right tabular text-ink-muted">{((v/monthlySummary.collected)*100).toFixed(1)}%</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            )}
          </div>
        </div>
      </div>

      <div className="bg-ivory-warm rounded-xl ring-soft p-5">
        <div className="flex flex-wrap items-end justify-between gap-3 mb-4">
          <div>
            <div className="text-[11px] uppercase tracking-wider text-ink-muted">Yearly Collection</div>
            <div className="font-display text-2xl text-ink">{year} · Total {inr(yearData.total)}</div>
          </div>
          <Field label="Year">
            <Select value={year} onChange={e => setYear(Number(e.target.value))}>
              {[year-2,year-1,year,year+1].map(y => <option key={y} value={y}>{y}</option>)}
            </Select>
          </Field>
        </div>
        <div className="flex items-end gap-2 h-40 px-2">
          {yearData.months.map(m => (
            <div key={m.month} className="flex-1 flex flex-col items-center justify-end gap-1.5 group">
              <div className="text-[10px] tabular text-ink-muted opacity-0 group-hover:opacity-100 transition">{inrShort(m.collected)}</div>
              <div className="w-full rounded-t bg-teal-500" style={{ height: `${(m.collected/yearData.max) * 100}%`, minHeight: '2px' }}></div>
              <div className="text-[10px] text-ink-muted">{m.month}</div>
            </div>
          ))}
        </div>
      </div>

      <div className="print-only">
        <div className="font-display text-2xl text-center mt-4 mb-2">{config.society_name} — Treasury Report</div>
        <div className="text-center text-sm text-ink-muted">Generated on {todayISO()} · Treasurer: {config.treasurer_name || '—'}</div>
      </div>
    </div>
  );
}

function Settings({ config, setConfig, flats, setFlats, payments, setPayments, toast,
                    driveStatus, driveLastSync, onOpenDriveSetup, onDisconnectDrive, onForgetDrive, onPullDrive, onPushDrive }) {
  const [draft, setDraft] = useState(config);
  useEffect(() => setDraft(config), [config]);
  const fileRef = useRef();

  const save = () => { setConfig(draft); toast('Settings saved', 'success'); };

  const updateRate = (tower, type, val) => {
    setDraft({ ...draft, rates: { ...draft.rates, [tower]: { ...draft.rates[tower], [type]: Number(val) || 0 } } });
  };

  const applyRatesToFlats = () => {
    if (!confirm('Apply current rates to every flat (overwriting per-flat overrides)?')) return;
    const next = flats.map(f => {
      const newRate = (draft.rates[f.tower] && draft.rates[f.tower][f.type]) || f.monthly_amount;
      return { ...f, monthly_amount: newRate, updated_at: nowISO() };
    });
    setFlats(next);
    toast('Rates applied to all flats', 'success');
  };

  const exportAll = () => {
    const backup = { exported_at: nowISO(), config, flats, payments };
    download(`sjm1-backup-${todayISO()}.json`, JSON.stringify(backup, null, 2), 'application/json');
    toast('Backup downloaded', 'success');
  };

  const importAll = (file) => {
    if (!confirm('This will replace all existing data with the contents of the backup file. Continue?')) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        if (!data.flats || !data.payments) throw new Error('Backup format unrecognised');
        setFlats(data.flats);
        setPayments(data.payments);
        if (data.config) setConfig(data.config);
        toast('Backup restored', 'success');
      } catch (e) {
        toast('Restore failed: ' + e.message, 'error');
      }
    };
    reader.readAsText(file);
  };

  const resetAll = async () => {
    if (!confirm('Delete all data and reinitialise the society from scratch? This cannot be undone.')) return;
    if (!confirm('Are you absolutely sure? Type-confirm by pressing OK again.')) return;
    await storage.del(K_FLATS); await storage.del(K_PAYMENTS); await storage.del(K_CONFIG);
    location.reload();
  };

  const driveTimeAgo = (() => {
    if (!driveLastSync) return '—';
    const s = Math.floor((Date.now() - driveLastSync) / 1000);
    if (s < 60) return 'just now';
    if (s < 3600) return `${Math.floor(s/60)} min ago`;
    if (s < 86400) return `${Math.floor(s/3600)} hrs ago`;
    return new Date(driveLastSync).toLocaleString();
  })();

  return (
    <div className="space-y-5">
      <div>
        <div className="text-[11px] uppercase tracking-[0.2em] text-clay-500 mb-1">Configuration</div>
        <h1 className="font-display text-4xl text-ink leading-none">Settings</h1>
        <p className="text-sm text-ink-muted mt-1.5">Society identity, maintenance rates, Google Drive sync, backups and reset.</p>
      </div>

      <div className="bg-ivory-warm rounded-xl ring-soft p-5">
        <div className="font-display text-lg text-teal-500 mb-3">Society &amp; Treasurer</div>
        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
          <Field label="Society name"><Input value={draft.society_name} onChange={e => setDraft({...draft, society_name: e.target.value})} /></Field>
          <Field label="Due day of month" hint="Reminders flag flats unpaid after this day"><Input type="number" min="1" max="28" value={draft.due_day} onChange={e => setDraft({...draft, due_day: Number(e.target.value)||10})} /></Field>
          <Field label="Treasurer name"><Input value={draft.treasurer_name} onChange={e => setDraft({...draft, treasurer_name: e.target.value})} /></Field>
          <Field label="Treasurer phone"><Input value={draft.treasurer_phone} onChange={e => setDraft({...draft, treasurer_phone: e.target.value})} /></Field>
          <Field label="Treasurer email" className="md:col-span-2"><Input value={draft.treasurer_email} onChange={e => setDraft({...draft, treasurer_email: e.target.value})} /></Field>
        </div>
        <div className="mt-4 flex justify-end"><Button onClick={save}>Save</Button></div>
      </div>

      <div className="bg-ivory-warm rounded-xl ring-soft p-5">
        <div className="flex items-center justify-between mb-3">

function DriveStatusBadge({ status, lastSync, onClick }) {
  // status: 'disabled' | 'connecting' | 'connected' | 'syncing' | 'error' | 'offline'
  const map = {
    disabled:   { cls: 'bg-ivory-deep text-ink-muted ring-soft',   dot: 'bg-ink-muted/50',  label: 'Local only' },
    connecting: { cls: 'bg-clay-500/10 text-clay-500 ring-1 ring-clay-500/30', dot: 'bg-clay-500 animate-pulse', label: 'Connecting…' },
    syncing:    { cls: 'bg-teal-500/10 text-teal-500 ring-1 ring-teal-500/30', dot: 'bg-teal-500 animate-pulse', label: 'Syncing…' },
    connected:  { cls: 'bg-moss-500/10 text-moss-500 ring-1 ring-moss-500/30', dot: 'bg-moss-500', label: 'Synced' },
    offline:    { cls: 'bg-clay-500/10 text-clay-500 ring-1 ring-clay-500/30', dot: 'bg-clay-500', label: 'Offline' },
    error:      { cls: 'bg-crimson-500/10 text-crimson-500 ring-1 ring-crimson-500/30', dot: 'bg-crimson-500', label: 'Sync error' },
  };
  const m = map[status] || map.disabled;
  const timeAgo = (() => {
    if (!lastSync) return '';
    const s = Math.floor((Date.now() - lastSync) / 1000);
    if (s < 60) return 'just now';
    if (s < 3600) return `${Math.floor(s/60)}m ago`;
    if (s < 86400) return `${Math.floor(s/3600)}h ago`;
    return `${Math.floor(s/86400)}d ago`;
  })();
  return (
    <button onClick={onClick} className={`w-full text-left rounded-md px-3 py-2 text-[11px] inline-flex items-center gap-2 transition ${m.cls} hover:opacity-90`}>
      <span className={`w-1.5 h-1.5 rounded-full ${m.dot}`}></span>
      <span className="flex-1">
        <div className="font-medium tracking-wider uppercase text-[10px]">{m.label}</div>
        {status === 'connected' && lastSync && <div className="text-[10px] opacity-70 normal-case font-normal mt-0.5">Drive · {timeAgo}</div>}
      </span>
      <Icon name="cloud" className="w-3.5 h-3.5 opacity-70" />
    </button>
  );
}

function App() {
  const [loading, setLoading] = useState(true);
  const [initialized, setInitialized] = useState(false);
  const [flats, setFlats] = useState([]);
  const [payments, setPayments] = useState([]);
  const [config, setConfig] = useState(DEFAULT_CONFIG);
  const [view, setView] = useState('dashboard');
  const [currentPeriod, setCurrentPeriod] = useState(getCurrentPeriod());
  const [toast, setToast] = useState(null);

  // Drive state
  const [driveOpen, setDriveOpen] = useState(false);
  const [driveStatus, setDriveStatus] = useState('disabled'); // disabled | connecting | connected | syncing | error | offline
  const [driveLastSync, setDriveLastSync] = useState(() => {
    const v = localStorage.getItem(K_DRIVE_LAST_SYNC);
    return v ? Number(v) : null;
  });

  const showToast = useCallback((message, type='info') => {
    setToast({ message, type });
    setTimeout(() => setToast(null), 2800);
  }, []);

  // ----- Drive helpers -----
  const recordSync = () => {
    const t = Date.now();
    setDriveLastSync(t);
    localStorage.setItem(K_DRIVE_LAST_SYNC, String(t));
  };

  const pullFromDrive = useCallback(async () => {
    if (!drive.isConfigured()) return null;
    setDriveStatus('syncing');
    try {
      const [fJson, pJson, cJson] = await Promise.all([
        drive.readFile('flats'),
        drive.readFile('payments'),
        drive.readFile('config'),
      ]);
      const result = {
        flats: fJson ? JSON.parse(fJson) : null,
        payments: pJson ? JSON.parse(pJson) : null,
        config: cJson ? JSON.parse(cJson) : null,
      };
      recordSync();
      setDriveStatus('connected');
      return result;
    } catch (e) {
      console.error('Drive pull failed', e);
      setDriveStatus('error');
      showToast('Drive pull failed: ' + e.message, 'error');
      return null;
    }
  }, [showToast]);

  // ----- Initial load -----
  useEffect(() => {
    (async () => {
      // 1. Load local (instant)
      const cfg = await storage.get(K_CONFIG, null);
      const f = await storage.get(K_FLATS, null);
      const p = await storage.get(K_PAYMENTS, []);
      let initFlats = (f && Array.isArray(f) && f.length > 0) ? f : null;
      let initPayments = (p || []).map(migratePayment);
      let initConfig = cfg ? { ...DEFAULT_CONFIG, ...cfg } : null;

      // 2. If Drive configured, try silent connect and pull
      if (drive.isConfigured() && !drive.isFileOrigin()) {
        setDriveStatus('connecting');
        try {
          await drive.connect({ promptUser: false });
          const dr = await pullFromDrive();
          if (dr) {
            if (dr.config) initConfig = { ...DEFAULT_CONFIG, ...dr.config };
            if (dr.flats && Array.isArray(dr.flats) && dr.flats.length) initFlats = dr.flats;
            if (dr.payments && Array.isArray(dr.payments)) initPayments = dr.payments.map(migratePayment);
          }
        } catch (e) {
          console.warn('Silent Drive connect failed', e);
          setDriveStatus('offline');
          showToast('Drive not connected (token expired). Click the badge to reconnect.', 'info');
        }
      } else if (drive.isConfigured() && drive.isFileOrigin()) {
        setDriveStatus('disabled');
      }

      if (initConfig) setConfig(initConfig);
      if (initFlats) {
        setFlats(initFlats); setPayments(initPayments); setInitialized(true);
      }
      setLoading(false);

      // 3. If not configured and not dismissed, show setup popup
      if (!drive.isConfigured() && !localStorage.getItem(K_DRIVE_DISMISSED)) {
        // give the UI a beat to render first
        setTimeout(() => setDriveOpen(true), 500);
      }
    })();
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  // ----- Auto-push to Drive on data change (debounced) -----
  const pushTimers = useRef({});
  const pushKey = useCallback((key, value) => {
    if (!drive.isConfigured() || drive.isFileOrigin()) return;
    clearTimeout(pushTimers.current[key]);
    pushTimers.current[key] = setTimeout(async () => {
      // re-check at fire time in case user disconnected during the debounce window
      if (!drive.isConfigured() || drive.isFileOrigin()) return;
      try {
        setDriveStatus('syncing');
        await drive.writeFile(key, JSON.stringify(value));
        recordSync();
        setDriveStatus('connected');
      } catch (e) {
        console.error('Drive push failed', key, e);
        setDriveStatus('error');
        // retry with fresh token next time the user interacts
      }
    }, 2500);
  }, []);

  // persist local + push to Drive on every change
  useEffect(() => {
    if (!initialized) return;
    storage.set(K_FLATS, flats);
    pushKey('flats', flats);
  }, [flats, initialized, pushKey]);
  useEffect(() => {
    if (!initialized) return;
    storage.set(K_PAYMENTS, payments);
    pushKey('payments', payments);
  }, [payments, initialized, pushKey]);
  useEffect(() => {
    if (!initialized) return;
    storage.set(K_CONFIG, config);
    pushKey('config', config);
  }, [config, initialized, pushKey]);

  const initialize = async () => {
    const newFlats = generateFlats();
    await storage.set(K_FLATS, newFlats);
    await storage.set(K_CONFIG, config);
    await storage.set(K_PAYMENTS, []);
    setFlats(newFlats); setPayments([]); setInitialized(true);
    showToast(`Society initialised with ${newFlats.length} units`, 'success');
  };

  const addPayments = (list) => setPayments(prev => [...prev, ...list]);
  const deletePayment = (id) => setPayments(prev => prev.filter(p => p.id !== id));

  // After connect via setup modal — decide what to do with existing data
  const onDriveConnected = useCallback(async () => {
    setDriveStatus('connecting');
    try {
      // Check what's on Drive
      const remoteJson = await drive.readFile('flats');
      const hasLocal = flats.length > 0;
      const hasRemote = !!remoteJson;
      if (hasRemote && hasLocal) {
        // both exist — ask user
        const wantPull = confirm(
          'Both Drive and local storage have data.\n\n' +
          'OK → Pull from Drive (replace local).\n' +
          'Cancel → Push local to Drive (overwrite Drive).'
        );
        if (wantPull) {
          const dr = await pullFromDrive();
          if (dr) {
            if (dr.flats) setFlats(dr.flats);
            if (dr.payments) setPayments(dr.payments.map(migratePayment));
            if (dr.config) setConfig({ ...DEFAULT_CONFIG, ...dr.config });
            showToast('Pulled data from Google Drive', 'success');
          }
        } else {
          setDriveStatus('syncing');
          await Promise.all([
            drive.writeFile('flats', JSON.stringify(flats)),
            drive.writeFile('payments', JSON.stringify(payments)),
            drive.writeFile('config', JSON.stringify(config)),
          ]);
          recordSync();
          setDriveStatus('connected');
          showToast('Pushed local data to Google Drive', 'success');
        }
      } else if (hasRemote) {
        // pull
        const dr = await pullFromDrive();
        if (dr) {
          if (dr.flats) setFlats(dr.flats);
          if (dr.payments) setPayments(dr.payments.map(migratePayment));
          if (dr.config) setConfig({ ...DEFAULT_CONFIG, ...dr.config });
          if (dr.flats && !initialized) setInitialized(true);
          showToast('Loaded data from Google Drive', 'success');
        }
      } else if (hasLocal) {
        // push
        setDriveStatus('syncing');
        await Promise.all([
          drive.writeFile('flats', JSON.stringify(flats)),
          drive.writeFile('payments', JSON.stringify(payments)),
          drive.writeFile('config', JSON.stringify(config)),
        ]);
        recordSync();
        setDriveStatus('connected');
        showToast('Uploaded local data to Google Drive', 'success');
      } else {
        setDriveStatus('connected');
        showToast('Connected to Google Drive', 'success');
      }
    } catch (e) {
      console.error(e);
      setDriveStatus('error');
      showToast('Connection succeeded but sync failed: ' + e.message, 'error');
    }
  }, [flats, payments, config, initialized, pullFromDrive, showToast]);

  const handleDriveBadgeClick = useCallback(async () => {
    if (!drive.isConfigured()) { setDriveOpen(true); return; }
    if (drive.isFileOrigin()) { setDriveOpen(true); return; }
    // Try (re)connect if currently disconnected
    if (!drive.isConnected()) {
      setDriveStatus('connecting');
      try {
        await drive.connect({ promptUser: true });
        await onDriveConnected();
      } catch (e) {
        setDriveStatus('error');
        showToast('Could not reconnect: ' + e.message, 'error');
      }
    } else {
      // Force a fresh pull
      const dr = await pullFromDrive();
      if (dr) {
        if (dr.flats) setFlats(dr.flats);
        if (dr.payments) setPayments(dr.payments.map(migratePayment));
        if (dr.config) setConfig({ ...DEFAULT_CONFIG, ...dr.config });
        showToast('Refreshed from Google Drive', 'success');
      }
    }
  }, [onDriveConnected, pullFromDrive, showToast]);

  const defaulterCount = useMemo(() => {
    const occupied = flats.filter(f => f.occupancy !== 'Vacant');
    return occupied.filter(f => paidByFlatInPeriod(payments, f.flat_no, currentPeriod) < f.monthly_amount).length;
  }, [flats, payments, currentPeriod]);

  if (loading) {
    return <div className="min-h-screen flex items-center justify-center">
      <div className="text-center">
        <div className="font-display text-3xl text-teal-500 mb-2">Sushma Joynest Moh 1</div>
        <div className="text-ink-muted text-sm">Loading the books…</div>
      </div>
    </div>;
  }

  if (!initialized) return (
    <>
      <Onboarding onInitialize={initialize} />
      <DriveSetupModal open={driveOpen} onClose={() => setDriveOpen(false)} onConnected={onDriveConnected} toast={showToast} hasLocalData={flats.length > 0} />
    </>
  );

  return (
    <div className="min-h-screen flex grain">
      <Sidebar
        view={view} setView={setView} society={config}
        defaulterCount={defaulterCount} currentPeriod={currentPeriod}
        driveStatus={driveStatus} driveLastSync={driveLastSync}
        onDriveBadgeClick={handleDriveBadgeClick}
      />
      <main className="flex-1 px-6 py-8 max-w-[1400px]">
        {view === 'dashboard' && <Dashboard flats={flats} payments={payments} currentPeriod={currentPeriod} setView={setView} setCurrentPeriod={setCurrentPeriod} />}
        {view === 'flats' && <FlatsView flats={flats} setFlats={setFlats} payments={payments} currentPeriod={currentPeriod} rates={config.rates} toast={showToast} />}
        {view === 'record' && <RecordPayment flats={flats} payments={payments} addPayments={addPayments} currentPeriod={currentPeriod} config={config} setConfig={setConfig} toast={showToast} setView={setView} />}
        {view === 'history' && <PaymentHistory payments={payments} flats={flats} deletePayment={deletePayment} toast={showToast} />}
        {view === 'defaulters' && <Defaulters flats={flats} payments={payments} currentPeriod={currentPeriod} config={config} toast={showToast} />}
        {view === 'reports' && <Reports flats={flats} payments={payments} currentPeriod={currentPeriod} config={config} />}
        {view === 'settings' && (
          <Settings
            config={config} setConfig={setConfig}
            flats={flats} setFlats={setFlats}
            payments={payments} setPayments={setPayments}
            toast={showToast}
            driveStatus={driveStatus} driveLastSync={driveLastSync}
            onOpenDriveSetup={() => setDriveOpen(true)}
            onDisconnectDrive={() => { drive.disconnect(); setDriveStatus('disabled'); setDriveLastSync(null); localStorage.removeItem(K_DRIVE_LAST_SYNC); showToast('Disconnected from Google Drive', 'info'); }}
            onForgetDrive={() => { drive.forget(); setDriveStatus('disabled'); setDriveLastSync(null); showToast('Drive credentials cleared', 'info'); }}
            onPullDrive={async () => {
              const dr = await pullFromDrive();
              if (dr) {
                if (dr.flats) setFlats(dr.flats);
                if (dr.payments) setPayments(dr.payments.map(migratePayment));
                if (dr.config) setConfig({ ...DEFAULT_CONFIG, ...dr.config });
                showToast('Pulled data from Google Drive', 'success');
              }
            }}
            onPushDrive={async () => {
              try {
                setDriveStatus('syncing');
                await Promise.all([
                  drive.writeFile('flats', JSON.stringify(flats)),
                  drive.writeFile('payments', JSON.stringify(payments)),
                  drive.writeFile('config', JSON.stringify(config)),
                ]);
                recordSync();
                setDriveStatus('connected');
                showToast('Pushed all data to Google Drive', 'success');
              } catch (e) {
                setDriveStatus('error');
                showToast('Push failed: ' + e.message, 'error');
              }
            }}
          />
        )}
      </main>
      <Toast toast={toast} />
      <DriveSetupModal open={driveOpen} onClose={() => setDriveOpen(false)} onConnected={onDriveConnected} toast={showToast} hasLocalData={flats.length > 0} />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
